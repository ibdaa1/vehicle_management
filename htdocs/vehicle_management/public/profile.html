<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title data-i18n="title">الملف الشخصي</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/vehicle_management/assets/css/global.css">

  <style>
    /* Page-specific styles kept close to original look */
    :root{
      --bg:#f4f6f8;
      --card:#fff;
      --accent:#1f6f2b;
      --muted:#6b7280;
      --text:#0d2b16;
      --border:#e6e9eb;
      --radius:12px;
      font-family:"Tajawal",system-ui,Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:16px}
    .wrap{max-width:980px;margin:22px auto;padding:18px}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#2e7a2f);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    h1{margin:0;font-size:1.15rem}
    .subtitle{color:var(--muted);font-size:0.95rem}
    .card{background:var(--card);border-radius:12px;padding:18px;border:1px solid var(--border);box-shadow:0 8px 20px rgba(15,46,14,0.04)}
    .grid{display:grid;grid-template-columns:1fr;gap:18px}
    form .row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
    .col{flex:1;min-width:150px}
    label{display:block;margin-bottom:8px;font-weight:600}
    input,select{width:100%;padding:11px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:15px}
    .actions{display:flex;gap:10px;margin-top:16px;align-items:center}
    .btn{display:inline-flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:0;background:var(--accent);color:#fff;cursor:pointer;font-weight:600}
    .btn.ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
    .small{font-size:0.9rem;color:var(--muted)}
    .msg{margin-top:12px;padding:10px;border-radius:8px}
    .msg.success{background:#eaf7ec;color:#066324;border:1px solid #d6efd9}
    .msg.error{background:#fff0f0;color:#811a1a;border:1px solid #f3caca}
    @media(max-width:520px){.logo{width:48px;height:48px}}
    input:focus, select:focus {outline:2px solid rgba(31,111,43,0.08);border-color:rgba(31,111,43,0.12)}
    
    /* Loading overlay */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    
    .loading-spinner.active {
      display: block;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Spinner -->
  <div class="loading-spinner" id="loadingSpinner">
    <div class="spinner"></div>
    <div id="loadingText">جاري التحميل...</div>
  </div>
  
  <div class="wrap">
    <div class="header">
      <div class="brand" aria-hidden="true">
        <div class="logo">H</div>
        <div>
          <h1 id="pageTitle" data-i18n="pageTitle">الملف الشخصي</h1>
          <div class="subtitle" id="pageSubtitle" data-i18n="pageSubtitle">البيانات بحسب الحساب</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <a id="backBtn" class="btn ghost" href="/vehicle_management/public/index.html" title="عودة" data-i18n-title="backBtnTitle">
          <i class="fa fa-arrow-right"></i>
          <span class="btn-text" data-i18n="backBtn">عودة</span>
        </a>
        <button id="logoutBtn" class="btn ghost" title="خروج" data-i18n-title="logoutBtnTitle">
          <i class="fa fa-sign-out-alt"></i>
          <span class="btn-text" data-i18n="logoutBtn">خروج</span>
        </button>
      </div>
    </div>

    <div class="grid">
      <main>
        <div class="card">
          <!-- keep action pointing to existing update endpoint -->
          <form id="profileForm" autocomplete="off" novalidate method="post" action="/vehicle_management/api/v1/profile" data-department-id="" data-section-id="" data-division-id="">
            <div class="row">
              <div class="col">
                <label for="emp_id" id="label_emp_id" data-i18n="labelEmpId">الرمز الوظيفي</label>
                <input id="emp_id" name="emp_id" type="text" readonly>
              </div>
              <div class="col">
                <label for="username" id="label_username" data-i18n="labelUsername">اسم المستخدم</label>
                <input id="username" name="username" type="text" required>
              </div>
            </div>

            <div class="row">
              <div class="col">
                <label for="email" id="label_email" data-i18n="labelEmail">البريد الإلكتروني</label>
                <input id="email" name="email" type="email" required>
              </div>
              <div class="col">
                <label for="phone" id="label_phone" data-i18n="labelPhone">الهاتف</label>
                <input id="phone" name="phone" type="text" placeholder="9715..." data-i18n-placeholder="phonePlaceholder">
              </div>
            </div>

            <div class="row">
              <div class="col">
                <label for="preferred_language" id="label_language" data-i18n="labelLanguage">اللغة</label>
                <select id="preferred_language" name="preferred_language">
                  <option value="ar" data-i18n="arabicOption">العربية</option>
                  <option value="en" data-i18n="englishOption">English</option>
                </select>
              </div>
              <div class="col">
                <label for="display_name" id="label_display_name" data-i18n="labelDisplayName">الاسم الظاهر</label>
                <input id="display_name" name="display_name" type="text" placeholder="" data-i18n-placeholder="displayNamePlaceholder">
              </div>
            </div>

            <hr style="margin:16px 0;border-top:1px solid var(--border)">

            <div class="row">
              <div class="col">
                <label for="department_id" id="label_department" data-i18n="labelDepartment">الإدارة</label>
                <select id="department_id" name="department_id" class="form-control" data-i18n-placeholder="selectDepartment"></select>
              </div>
              <div class="col">
                <label for="section_id" id="label_section" data-i18n="labelSection">القسم</label>
                <select id="section_id" name="section_id" class="form-control" data-i18n-placeholder="selectSection"></select>
              </div>
              <div class="col">
                <label for="division_id" id="label_division" data-i18n="labelDivision">الشعبة</label>
                <select id="division_id" name="division_id" class="form-control" data-i18n-placeholder="selectDivision"></select>
              </div>
            </div>

            <div style="margin-top:12px" class="small" id="pwd_hint" data-i18n="pwdHint">لتغيير كلمة المرور أدخل كلمة المرور الحالية ثم الجديدة، وإلا اترك الحقول فارغة.</div>

            <div class="row" style="margin-top:10px">
              <div class="col">
                <label for="current_password" id="label_current_password" data-i18n="labelCurrentPassword">كلمة المرور الحالية</label>
                <input id="current_password" name="current_password" type="password" autocomplete="current-password">
              </div>
              <div class="col">
                <label for="new_password" id="label_new_password" data-i18n="labelNewPassword">كلمة المرور الجديدة</label>
                <input id="new_password" name="new_password" type="password" autocomplete="new-password">
              </div>
            </div>

            <div class="actions">
              <button type="submit" id="saveBtn" class="btn">
                <i class="fa fa-save"></i> 
                <span id="saveLabel" data-i18n="saveLabel">حفظ</span>
              </button>
              <button type="button" id="cancelBtn" class="btn ghost">
                <i class="fa fa-times"></i> 
                <span id="cancelLabel" data-i18n="cancelLabel">إلغاء</span>
              </button>
            </div>

            <div id="messages" aria-live="polite"></div>
          </form>
        </div>
      </main>
    </div>
  </div>

<script src="/vehicle_management/assets/js/profile.js"></script>
<script>
// Global variables for translation
let currentLanguage = 'ar';
let translations = {};

// Function to show/hide loading
function showLoading(show) {
  const spinner = document.getElementById('loadingSpinner');
  if (show) {
    spinner.classList.add('active');
    document.body.style.overflow = 'hidden';
  } else {
    spinner.classList.remove('active');
    document.body.style.overflow = 'auto';
  }
}

// Load translations
async function loadTranslations(lang) {
  try {
    const response = await fetch(`/vehicle_management/languages/${lang}_profile.json`);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    return await response.json();
  } catch (error) {
    console.warn(`Failed to load ${lang} translations:`, error);
    // Return fallback translations
    return getFallbackTranslations(lang);
  }
}

// Fallback translations
function getFallbackTranslations(lang) {
  const fallback = {
    ar: {
      title: "الملف الشخصي",
      pageTitle: "الملف الشخصي",
      pageSubtitle: "البيانات بحسب الحساب",
      backBtnTitle: "عودة",
      backBtn: "عودة",
      logoutBtnTitle: "خروج",
      logoutBtn: "خروج",
      labelEmpId: "الرمز الوظيفي",
      labelUsername: "اسم المستخدم",
      labelEmail: "البريد الإلكتروني",
      labelPhone: "الهاتف",
      phonePlaceholder: "9715...",
      labelLanguage: "اللغة",
      arabicOption: "العربية",
      englishOption: "English",
      labelDisplayName: "الاسم الظاهر",
      displayNamePlaceholder: "الاسم المعروض",
      labelDepartment: "الإدارة",
      labelSection: "القسم",
      labelDivision: "الشعبة",
      selectDepartment: "اختر الإدارة",
      selectSection: "اختر القسم",
      selectDivision: "اختر الشعبة",
      pwdHint: "لتغيير كلمة المرور أدخل كلمة المرور الحالية ثم الجديدة، وإلا اترك الحقول فارغة.",
      labelCurrentPassword: "كلمة المرور الحالية",
      labelNewPassword: "كلمة المرور الجديدة",
      saveLabel: "حفظ",
      cancelLabel: "إلغاء",
      loadingText: "جاري التحميل...",
      savingText: "جارٍ الحفظ...",
      saveSuccess: "تم حفظ التغييرات بنجاح",
      saveError: "حدث خطأ أثناء الحفظ",
      networkError: "خطأ في الاتصال بالشبكة",
      validationError: "الرجاء ملء جميع الحقول المطلوبة",
      passwordMismatch: "كلمة المرور الحالية غير صحيحة",
      passwordUpdated: "تم تحديث كلمة المرور بنجاح",
      profileUpdated: "تم تحديث الملف الشخصي بنجاح"
    },
    en: {
      title: "Profile",
      pageTitle: "Profile",
      pageSubtitle: "Account Information",
      backBtnTitle: "Back",
      backBtn: "Back",
      logoutBtnTitle: "Logout",
      logoutBtn: "Logout",
      labelEmpId: "Employee ID",
      labelUsername: "Username",
      labelEmail: "Email",
      labelPhone: "Phone",
      phonePlaceholder: "9715...",
      labelLanguage: "Language",
      arabicOption: "Arabic",
      englishOption: "English",
      labelDisplayName: "Display Name",
      displayNamePlaceholder: "Display Name",
      labelDepartment: "Department",
      labelSection: "Section",
      labelDivision: "Division",
      selectDepartment: "Select Department",
      selectSection: "Select Section",
      selectDivision: "Select Division",
      pwdHint: "To change password, enter current then new password. Leave blank otherwise.",
      labelCurrentPassword: "Current Password",
      labelNewPassword: "New Password",
      saveLabel: "Save",
      cancelLabel: "Cancel",
      loadingText: "Loading...",
      savingText: "Saving...",
      saveSuccess: "Changes saved successfully",
      saveError: "Error saving changes",
      networkError: "Network connection error",
      validationError: "Please fill all required fields",
      passwordMismatch: "Current password is incorrect",
      passwordUpdated: "Password updated successfully",
      profileUpdated: "Profile updated successfully"
    }
  };
  return fallback[lang] || fallback.ar;
}

// Apply translations to the page
function applyTranslations() {
  // Apply to text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[key]) {
      el.textContent = translations[key];
    }
  });

  // Apply to title attributes
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.getAttribute('data-i18n-title');
    if (translations[key]) {
      el.title = translations[key];
    }
  });

  // Apply to placeholder attributes
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (translations[key]) {
      el.placeholder = translations[key];
    }
  });

  // Update page title
  document.title = translations.title || 'الملف الشخصي';
  
  // Update loading text
  const loadingText = document.getElementById('loadingText');
  if (loadingText && translations.loadingText) {
    loadingText.textContent = translations.loadingText;
  }

  // Update HTML lang attribute
  document.documentElement.lang = currentLanguage;
  document.documentElement.dir = currentLanguage === 'ar' ? 'rtl' : 'ltr';
}

// Change language function
async function changeLanguage(lang) {
  showLoading(true);
  currentLanguage = lang;
  
  // Load translations
  translations = await loadTranslations(lang);
  
  // Apply translations
  applyTranslations();
  
  // Update language in select
  const langSelect = document.getElementById('preferred_language');
  if (langSelect) {
    langSelect.value = lang;
  }
  
  showLoading(false);
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', async () => {
  showLoading(true);
  
  try {
    // Get user language preference from URL or cookie
    const urlParams = new URLSearchParams(window.location.search);
    const langParam = urlParams.get('lang');
    
    if (langParam && (langParam === 'ar' || langParam === 'en')) {
      currentLanguage = langParam;
    } else {
      // Try to get from cookie
      const cookieLang = document.cookie
        .split('; ')
        .find(row => row.startsWith('user_language='))
        ?.split('=')[1];
      
      if (cookieLang && (cookieLang === 'ar' || cookieLang === 'en')) {
        currentLanguage = cookieLang;
      }
    }
    
    // Load translations
    translations = await loadTranslations(currentLanguage);
    
    // Apply translations
    applyTranslations();
    
    // Add language change listener
    const langSelect = document.getElementById('preferred_language');
    if (langSelect) {
      langSelect.addEventListener('change', async (e) => {
        await changeLanguage(e.target.value);
      });
    }
    
  } catch (error) {
    console.error('Error initializing page:', error);
  } finally {
    showLoading(false);
  }
});

// Basic logout and cancel functionality
document.addEventListener('DOMContentLoaded', () => {
  const logoutBtn = document.getElementById('logoutBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async () => {
      showLoading(true);
      try {
        await fetch('/vehicle_management/public/logout.php', { 
          method: 'POST',
          credentials: 'same-origin' 
        });
      } catch (e) {
        console.error('Logout error:', e);
      }
      window.location.href = '/vehicle_management/public/login.html';
    });
  }
  
  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => {
      window.location.href = '/vehicle_management/public/index.html';
    });
  }
});
</script>
</body>
</html>
