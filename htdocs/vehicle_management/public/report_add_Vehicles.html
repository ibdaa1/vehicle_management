<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="pageTitle">تقرير إدارة المركبات</title>
  <link rel="stylesheet" href="/vehicle_management/assets/css/add_Vehicles.css">
  <style>
    :root{
      --bg: #fbfdfb;
      --card: #fff;
      --primary: #254b2a;
      --accent: #3f6e3f;
      --muted: #bda36b;
      --text: #0f2a18;
      --border: #e9efe9;
      --radius: 12px;
      --danger: #dc2626;
    }
    html,body{height:100%;margin:0;font-family:"Tajawal",system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1200px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
    .card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:0 6px 22px rgba(15,40,20,0.04);flex:1;display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    h1{margin:0;font-size:1.25rem;color:var(--primary)}
    .subtitle{color:var(--muted);font-size:0.95rem}
    .meta{color:var(--muted);font-weight:600}
    .userInfo{font-size:0.95rem;color:var(--text);font-weight:600}
    .search-section{margin-bottom:16px}
    .search-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .search-input{flex:1;min-width:200px}
    .filter-select{min-width:150px}
    .results-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .results-header{margin-bottom:12px}
    .table-container{flex:1;overflow:auto}
    .vehicles-table{width:100%;border-collapse:collapse;margin-bottom:16px}
    .vehicles-table th,.vehicles-table td{padding:12px 8px;text-align:right;border-bottom:1px solid var(--border)}
    .vehicles-table th{font-weight:700;color:var(--primary);background:var(--bg)}
    .status-badge{display:inline-block;padding:4px 8px;border-radius:20px;font-size:12px;font-weight:600}
    .status-operational{background:#d1fae5;color:#065f46}
    .status-maintenance{background:#fef3c7;color:#92400e}
    .status-out_of_service{background:#fee2e2;color:#991b1b}
    .pagination{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:16px}
    .page-btn{padding:8px 12px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;border-radius:6px;transition:background 0.2s}
    .page-btn:hover,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .page-info{margin:0 12px;color:var(--muted)}
    [dir="rtl"] .vehicles-table th,.vehicles-table td{text-align:right}
    [dir="ltr"] .vehicles-table th,.vehicles-table td{text-align:left}
    [dir="rtl"] .search-row,[dir="rtl"] .header{justify-content:flex-end}
    [dir="ltr"] .search-row,[dir="ltr"] .header{justify-content:flex-start}
    [data-i18n]{transition:opacity 0.3s}
    @media(max-width:768px){
      .container{padding:8px}
      .search-row{flex-direction:column;align-items:stretch}
      .search-input,.filter-select{width:100%}
      .vehicles-table{font-size:14px}
      .vehicles-table th,.vehicles-table td{padding:8px 4px}
      .header{flex-direction:column;align-items:stretch;text-align:center}
    }
    @media(max-width:480px){
      .vehicles-table th{display:none}
      .vehicles-table td{display:block;padding:8px;text-align:right;border-bottom:2px solid var(--border);position:relative}
      .vehicles-table td:before{content:attr(data-label);font-weight:700;display:block;color:var(--primary);margin-bottom:4px}
      [dir="ltr"] .vehicles-table td{text-align:left}
    }
    /* Print styles */
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .card { box-shadow: none; border: 1px solid #000; }
      .vehicles-table { border-collapse: collapse; }
      .vehicles-table th, .vehicles-table td { border: 1px solid #000; }
      .pagination { display: none; }
      button { display: none; }
    }
    .print-btn { background: #059669; color: white; }
  </style>
</head>
<body>
  <main class="container">
    <section class="card" id="reportCard" aria-labelledby="reportTitle">
      <div class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">HCS</div>
          <div>
            <h1 id="reportTitle" data-i18n="pageTitle">تقرير إدارة المركبات</h1>
            <div class="subtitle" id="reportSubtitle">نتائج البحث والفلاترة</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="meta" id="orgName" data-i18n="orgName">HCS Department</div>
          <div class="userInfo" id="loggedUser">---</div>
        </div>
      </div>
    
      <!-- Search and Filter Section -->
      <div class="search-section no-print">
        <div class="search-row">
          <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 بحث: رقم المركبة، الرمز الوظيفي، اسم السائق، هاتف السائق..." />
          <select id="deptFilter" class="filter-select">
            <option value="" data-i18n="deptFilterPlaceholder">كل الإدارات</option>
          </select>
          <select id="sectionFilter" class="filter-select">
            <option value="" data-i18n="sectionFilterPlaceholder">كل الأقسام</option>
          </select>
          <select id="statusFilter" class="filter-select">
            <option value="" data-i18n="statusFilterPlaceholder">كل الحالات</option>
            <option value="operational" data-i18n="statusOperational">✅ قيد التشغيل</option>
            <option value="maintenance" data-i18n="statusMaintenance">🔧 صيانة</option>
            <option value="out_of_service" data-i18n="statusOutOfService">❌ خارج الخدمة</option>
          </select>
          <button id="searchBtn" class="btn icon-only" type="button" data-i18n-title="searchBtnTitle" title="بحث">🔍</button>
          <button id="printBtn" class="btn print-btn icon-only" type="button" title="طباعة التقرير">🖨️</button>
        </div>
      </div>
      
      <!-- Results Table Section -->
      <div id="resultsSection" class="results-section" style="display:none;">
        <div class="results-header">
          <h2 data-i18n="resultsHeader">نتائج البحث (<span id="totalCount">0</span>)</h2>
        </div>
        <div class="table-container">
          <table id="vehiclesTable" class="vehicles-table">
            <thead>
              <tr>
                <th data-i18n="thId">ID</th>
                <th data-i18n="thVehicleCode">رقم المركبة</th>
                <th data-i18n="thDriver">السائق</th>
                <th data-i18n="thDriverPhone">هاتف السائق</th>
                <th data-i18n="thEmpId">الرمز الوظيفي</th>
                <th data-i18n="thDepartment">الإدارة</th>
                <th data-i18n="thSection">القسم</th>
                <th data-i18n="thDivision">الشعبة</th>
                <th data-i18n="thStatus">الحالة</th>
              </tr>
            </thead>
            <tbody id="vehiclesTableBody">
              <!-- Results will be inserted here by JS -->
            </tbody>
          </table>
        </div>
        <div class="pagination no-print" id="pagination">
          <!-- Pagination controls will be inserted here by JS -->
        </div>
      </div>
    </section>
  </main>
  <script>
    (function () {
      'use strict';
      const API_HELPER = '/vehicle_management/api/helper/get_references.php';
      const API_SESSION = '/vehicle_management/api/users/session_check.php';
      const API_VEHICLE_LIST = '/vehicle_management/api/vehicle/list.php';
      const SESSION_INIT = '/vehicle_management/api/config/session.php?init=1';
      const searchInput = document.getElementById('searchInput');
      const deptFilter = document.getElementById('deptFilter');
      const sectionFilter = document.getElementById('sectionFilter');
      const statusFilter = document.getElementById('statusFilter');
      const searchBtn = document.getElementById('searchBtn');
      const printBtn = document.getElementById('printBtn');
      const resultsSection = document.getElementById('resultsSection');
      const vehiclesTableBody = document.getElementById('vehiclesTableBody');
      const totalCount = document.getElementById('totalCount');
      const pagination = document.getElementById('pagination');
      const loggedUserEl = document.getElementById('loggedUser');
      const orgNameEl = document.getElementById('orgName');
      const DEFAULT_DEPARTMENT = '1';
      let globalSessionId = null;
      let currentReferences = null;
      let currentPage = 1;
      let perPage = 100; // Higher for report
      let currentLang = 'ar';
      const translations = {
        ar: {
          pageTitle: 'تقرير إدارة المركبات',
          orgName: "HCS Department",
          searchPlaceholder: '🔍 بحث: رقم المركبة، الرمز الوظيفي، اسم السائق، هاتف السائق...',
          deptFilterPlaceholder: 'كل الإدارات',
          sectionFilterPlaceholder: 'كل الأقسام',
          statusFilterPlaceholder: 'كل الحالات',
          searchBtnTitle: 'بحث',
          resultsHeader: 'نتائج البحث',
          thId: 'ID',
          thVehicleCode: 'رقم المركبة',
          thDriver: 'السائق',
          thDriverPhone: 'هاتف السائق',
          thEmpId: 'الرمز الوظيفي',
          thDepartment: 'الإدارة',
          thSection: 'القسم',
          thDivision: 'الشعبة',
          thStatus: 'الحالة',
          statusOperational: "✅ قيد التشغيل",
          statusMaintenance: "🔧 صيانة",
          statusOutOfService: "❌ خارج الخدمة",
          noResults: 'لا توجد نتائج',
          pageInfo: (page, totalPages) => `صفحة ${page} من ${totalPages}`,
          prevPage: '«',
          nextPage: '»',
          notSpecified: 'غير محدد'
        },
        en: {
          pageTitle: 'Vehicle Management Report',
          orgName: "HCS Department",
          searchPlaceholder: '🔍 Search: Vehicle Number, Employee ID, Driver Name, Driver Phone...',
          deptFilterPlaceholder: 'All Departments',
          sectionFilterPlaceholder: 'All Sections',
          statusFilterPlaceholder: 'All Statuses',
          searchBtnTitle: 'Search',
          resultsHeader: 'Search Results',
          thId: 'ID',
          thVehicleCode: 'Vehicle Number',
          thDriver: 'Driver',
          thDriverPhone: 'Driver Phone',
          thEmpId: 'Employee ID',
          thDepartment: 'Department',
          thSection: 'Section',
          thDivision: 'Division',
          thStatus: 'Status',
          statusOperational: "✅ Operational",
          statusMaintenance: "🔧 Maintenance",
          statusOutOfService: "❌ Out of Service",
          noResults: 'No results found',
          pageInfo: (page, totalPages) => `Page ${page} of ${totalPages}`,
          prevPage: '«',
          nextPage: '»',
          notSpecified: 'Not specified'
        }
      };
      function applyTranslation(lang) {
        currentLang = lang.toLowerCase();
        const t = translations[currentLang] || translations.ar;
        document.title = t.pageTitle;
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (t[key]) el.textContent = t[key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
          const key = el.getAttribute('data-i18n-placeholder');
          if (t[key]) el.placeholder = t[key];
        });
        if (statusFilter) {
          statusFilter.options[0].textContent = t.statusFilterPlaceholder;
          if (statusFilter.options[1]) statusFilter.options[1].textContent = t.statusOperational;
          if (statusFilter.options[2]) statusFilter.options[2].textContent = t.statusMaintenance;
          if (statusFilter.options[3]) statusFilter.options[3].textContent = t.statusOutOfService;
        }
        if (deptFilter && deptFilter.options[0]) deptFilter.options[0].textContent = t.deptFilterPlaceholder;
        if (sectionFilter && sectionFilter.options[0]) sectionFilter.options[0].textContent = t.sectionFilterPlaceholder;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
      }
      function showMsg(text, type='info'){
        console.log(`${type}: ${text}`); // Simple console for report
      }
      function clearMsg(){}
      function getCookie(name) {
        const re = new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()[]\/+^])/g, '\\$1') + '=([^;]*)');
        const m = document.cookie.match(re);
        const val = m ? decodeURIComponent(m[1]) : null;
        return val;
      }
      async function fetchJson(url, opts = {}) {
        opts = Object.assign({}, opts);
        opts.credentials = 'include';
        if (!opts.headers) opts.headers = {};
        opts.headers['Accept'] = 'application/json';
        opts.headers['X-Requested-With'] = 'XMLHttpRequest';
        const sid = globalSessionId || getCookie('PHPSESSID') || getCookie('phpsessid');
        if (sid) opts.headers['X-Session-Id'] = sid;
        try {
          const res = await fetch(url, opts);
          const text = await res.text().catch(()=>null);
          let json = null;
          try { if (text) json = JSON.parse(text); } catch(e){ json = null; }
          return { ok: res.ok, status: res.status, json, text, headers: res.headers };
        } catch (e) {
          return { ok: false, status: 0, json: null, text: null, error: e };
        }
      }
      async function initSessionOnServer() {
        try {
          const initRes = await fetchJson(SESSION_INIT, { method: 'GET' });
          if (initRes.ok && initRes.json && initRes.json.session_id) {
            globalSessionId = initRes.json.session_id;
          }
        } catch (e) {
        }
      }
      async function sessionCheck() {
        const r = await fetchJson(API_SESSION, { method: 'GET' });
        if (!r.ok || !r.json || !r.json.success) {
          showMsg('Not authenticated — Please log in', 'error');
          window.location.href = '/vehicle_management/public/login.html';
          return null;
        }
        if (loggedUserEl) loggedUserEl.textContent = `${r.json.user.username || ''} (ID: ${r.json.user.emp_id || ''})`;
        if (orgNameEl) orgNameEl.textContent = r.json.user.orgName || translations[currentLang].orgName;
        globalSessionId = r.json.session_id || globalSessionId;
        return r.json;
      }
      async function loadReferences(lang) {
        const res = await fetchJson(API_HELPER + '?lang=' + encodeURIComponent(lang), { method: 'GET' });
        let deps = [], secs = [];
        if (res.ok && res.json) {
          deps = res.json.departments || [];
          secs = res.json.sections || [];
        }
        if (!Array.isArray(deps) || deps.length === 0) {
          const rd = await fetchJson(API_HELPER + '?type=departments&lang=' + encodeURIComponent(lang));
          deps = (rd.json && rd.json.departments) || [];
        }
        if (!Array.isArray(secs) || secs.length === 0) {
          const rs = await fetchJson(API_HELPER + '?type=sections&lang=' + encodeURIComponent(lang));
          secs = (rs.json && rs.json.sections) || [];
        }
        currentReferences = { departments: deps, sections: secs };
        return { departments: deps, sections: secs };
      }
      function populateFilterSelect(sel, items, lang, placeholder) {
        sel.innerHTML = `<option value="">${placeholder}</option>`;
        (items || []).forEach(it => {
          const id = String(it.id ?? '');
          const label = (lang === 'en') ? (it.name_en || it.name || it.name_ar) : (it.name_ar || it.name || it.name_en);
          const o = document.createElement('option');
          o.value = id;
          o.textContent = label || id;
          sel.appendChild(o);
        });
      }
      async function loadVehicles(page = 1) {
        const q = searchInput.value.trim();
        const dept = deptFilter.value;
        const section = sectionFilter.value;
        const status = statusFilter.value;
        currentPage = page;
      
        const params = new URLSearchParams();
        if (q) params.append('q', q);
        if (dept) params.append('department_id', dept);
        if (section) params.append('section_id', section);
        if (status) params.append('status', status);
        params.append('page', String(page));
        params.append('per_page', String(perPage));
      
        const r = await fetchJson(API_VEHICLE_LIST + '?' + params.toString(), { method: 'GET' });
      
        if (!r.ok || !r.json || !r.json.success) {
          showMsg('فشل تحميل المركبات', 'error');
          return;
        }
      
        const data = r.json;
        totalCount.textContent = String(data.total || 0);
        resultsSection.style.display = 'flex';
      
        const t = translations[currentLang];
        const nameField = currentLang === 'ar' ? 'name_ar' : 'name_en';
        const vehiclesWithNames = (data.vehicles || []).map(v => {
          const deptName = currentReferences?.departments?.find(d => String(d.id) === String(v.department_id))?.[nameField] || v.department_name || t.notSpecified;
          const secName = currentReferences?.sections?.find(s => String(s.id) === String(v.section_id))?.[nameField] || v.section_name || t.notSpecified;
          const divName = v.division_name || t.notSpecified; // Assuming no divisions in report or fetch from refs if available
          return { ...v, department_name: deptName, section_name: secName, division_name: divName };
        });
      
        renderVehiclesTable(vehiclesWithNames);
        renderPagination(data.total, data.page, data.per_page);
      }
      function renderVehiclesTable(vehicles) {
        const t = translations[currentLang];
        vehiclesTableBody.innerHTML = '';
      
        if (vehicles.length === 0) {
          vehiclesTableBody.innerHTML = `<tr><td colspan="9" style="text-align:center;color:var(--muted)">${t.noResults}</td></tr>`;
          return;
        }
      
        vehicles.forEach(v => {
          const tr = document.createElement('tr');
        
          const statusClass = `status-${v.status || 'operational'}`;
          const statusText = v.status === 'operational' ? t.statusOperational :
                             v.status === 'maintenance' ? t.statusMaintenance : t.statusOutOfService;
        
          tr.innerHTML = `
            <td data-label="${t.thId}">${v.id}</td>
            <td data-label="${t.thVehicleCode}">${v.vehicle_code || '-'}</td>
            <td data-label="${t.thDriver}">${v.driver_name || '-'}</td>
            <td data-label="${t.thDriverPhone}">${v.driver_phone || '-'}</td>
            <td data-label="${t.thEmpId}">${v.emp_id || '-'}</td>
            <td data-label="${t.thDepartment}">${v.department_name}</td>
            <td data-label="${t.thSection}">${v.section_name}</td>
            <td data-label="${t.thDivision}">${v.division_name}</td>
            <td data-label="${t.thStatus}"><span class="status-badge ${statusClass}">${statusText}</span></td>
          `;
        
          vehiclesTableBody.appendChild(tr);
        });
      }
      function renderPagination(total, page, per_page) {
        const t = translations[currentLang];
        const totalPages = Math.ceil(total / per_page);
        pagination.innerHTML = '';
      
        if (totalPages <= 1) return;
      
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn no-print';
        prevBtn.textContent = t.prevPage;
        prevBtn.disabled = page <= 1;
        prevBtn.addEventListener('click', () => loadVehicles(page - 1));
        pagination.appendChild(prevBtn);
      
        const start = Math.max(1, page - 2);
        const end = Math.min(totalPages, page + 2);
      
        for (let i = start; i <= end; i++) {
          const pageBtn = document.createElement('button');
          pageBtn.className = 'page-btn no-print' + (i === page ? ' active' : '');
          pageBtn.textContent = String(i);
          pageBtn.addEventListener('click', () => loadVehicles(i));
          pagination.appendChild(pageBtn);
        }
      
        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn no-print';
        nextBtn.textContent = t.nextPage;
        nextBtn.disabled = page >= totalPages;
        nextBtn.addEventListener('click', () => loadVehicles(page + 1));
        pagination.appendChild(nextBtn);
      
        const info = document.createElement('span');
        info.className = 'page-info no-print';
        info.textContent = t.pageInfo(page, totalPages);
        pagination.appendChild(info);
      }
      function printReport() {
        window.print();
      }
      async function init() {
        await initSessionOnServer();
        const sess = await sessionCheck();
        if (!sess) return;
        currentLang = (sess.user && sess.user.preferred_language) ? sess.user.preferred_language.toLowerCase() : (document.documentElement.lang || 'ar');
        applyTranslation(currentLang);
        const refs = await loadReferences(currentLang);
        const t = translations[currentLang];
        populateFilterSelect(deptFilter, refs.departments, currentLang, t.deptFilterPlaceholder);
        populateFilterSelect(sectionFilter, refs.sections, currentLang, t.sectionFilterPlaceholder);
        deptFilter.addEventListener('change', () => {
          const selectedDept = deptFilter.value;
          const filteredSections = refs.sections.filter(s => String(s.department_id ?? '') === String(selectedDept));
          populateFilterSelect(sectionFilter, filteredSections, currentLang, t.sectionFilterPlaceholder);
          loadVehicles(1);
        });
        sectionFilter.addEventListener('change', () => loadVehicles(1));
        statusFilter.addEventListener('change', () => loadVehicles(1));
        searchBtn.addEventListener('click', () => loadVehicles(1));
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadVehicles(1); });
        printBtn.addEventListener('click', printReport);
        await loadVehicles(1);
      }
      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
