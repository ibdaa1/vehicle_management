<!doctype html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>حركة المركبات - استلام وإرجاع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vehicle_management/assets/css/vehicle_movements.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Section -->
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-logo">
          <div class="logo-icon">HCS</div>
        </div>
        <div class="brand-info">
          <h1 class="page-title">لوحة تحكم حركة المركبات</h1>
          <p class="page-subtitle">إدارة عمليات الاستلام والإرجاع</p>
        </div>
      </div>
      
      <div class="header-user">
        <div class="org-name" id="orgName">إدارة الرقابة والسلامة الصحية</div>
        <div class="user-profile">
          <div class="user-avatar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" fill="#4A5568"/>
              <path d="M12 14C7.58 14 4 15.79 4 18V20H20V18C20 15.79 16.42 14 12 14Z" fill="#4A5568"/>
            </svg>
          </div>
          <div class="user-details">
            <span class="user-name" id="loggedUser">---</span>
            <span class="user-role">مستخدم النظام</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Quick Actions Bar -->
    <div class="quick-actions-bar">
      <div class="actions-left">
        <button id="randomAssignmentBtn" class="action-btn primary-btn">
          <span class="btn-icon">🎲</span>
          <span class="btn-text">سحب عشوائي</span>
        </button>
        <button id="adminReturnBtn" class="action-btn secondary-btn">
          <span class="btn-icon">↩️</span>
          <span class="btn-text">إرجاع مركبة</span>
        </button>
      </div>
      
      <div class="actions-right">
        <div class="vehicle-counter" id="vehicleCountContainer">
          <span class="counter-icon">🚗</span>
          <span class="counter-text">عدد المركبات:</span>
          <span class="counter-value" id="vehicleCount">0</span>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Filters Section -->
      <section class="filters-section">
        <div class="search-box">
          <div class="search-icon">🔍</div>
          <input type="text" id="searchInput" class="search-input" placeholder="ابحث برقم المركبة، السائق، النوع...">
          <button class="search-clear" onclick="document.getElementById('searchInput').value = ''; loadVehicles();">✕</button>
        </div>
        
        <div class="filters-grid">
          <div class="filter-group">
            <label class="filter-label">الإدارة</label>
            <select id="departmentFilter" class="filter-select">
              <option value="">جميع الإدارات</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">القسم</label>
            <select id="sectionFilter" class="filter-select">
              <option value="">جميع الأقسام</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">الشعبة</label>
            <select id="divisionFilter" class="filter-select">
              <option value="">جميع الشعب</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">الحالة التشغيلية</label>
            <select id="statusFilter" class="filter-select">
              <option value="">الكل</option>
              <option value="operational">قيد التشغيل</option>
              <option value="maintenance">صيانة</option>
              <option value="out_of_service">خارج الخدمة</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">حالة الاستلام</label>
            <select id="checkoutStatusFilter" class="filter-select">
              <option value="">الكل</option>
              <option value="available">متاحة</option>
              <option value="checked_out">مستلمة</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">نوع المركبة</label>
            <select id="vehicleTypeFilter" class="filter-select">
              <option value="">الكل</option>
              <option value="shift">ورديات</option>
              <option value="private">خاصة</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">نوع الحركة</label>
            <select id="movementTypeFilter" class="filter-select">
              <option value="">الكل</option>
              <option value="pickup">استلام</option>
              <option value="return">إرجاع</option>
            </select>
          </div>
          
          <div class="filter-group">
            <label class="filter-label">&nbsp;</label>
            <button class="filter-reset-btn" onclick="resetFilters()">
              <span class="reset-icon">🔄</span>
              <span>إعادة تعيين</span>
            </button>
          </div>
        </div>
      </section>

      <!-- Loading State -->
      <div id="loadingMsg" class="loading-container" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">جاري تحميل المركبات...</div>
      </div>

      <!-- Vehicles Grid -->
      <section class="vehicles-grid-section">
        <div id="vehiclesContainer" class="vehicles-grid">
          <!-- Cards will be inserted here by JavaScript -->
        </div>
      </section>
    </main>

    <!-- Warning Messages Area -->
    <div id="warningArea" class="warning-area"></div>
    
    <!-- Movement Detail Modal -->
    <div id="movementDetailModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">تفاصيل الحركة</h2>
          <button class="modal-close" onclick="closeMovementModal()">&times;</button>
        </div>
        
        <div class="modal-body">
          <!-- Vehicle and Movement Info -->
          <div class="info-section">
            <h3>معلومات المركبة</h3>
            <div class="info-grid">
              <div class="info-item">
                <span class="info-label">رمز المركبة:</span>
                <span class="info-value" id="modalVehicleCode">-</span>
              </div>
              <div class="info-item">
                <span class="info-label">نوع الحركة:</span>
                <span class="info-value" id="modalOperationType">-</span>
              </div>
              <div class="info-item">
                <span class="info-label">بواسطة:</span>
                <span class="info-value" id="modalPerformedBy">-</span>
              </div>
              <div class="info-item">
                <span class="info-label">التاريخ:</span>
                <span class="info-value" id="modalDateTime">-</span>
              </div>
            </div>
          </div>
          
          <!-- Coordinates Section -->
          <div class="info-section">
            <h3>الإحداثيات الجغرافية</h3>
            <div class="coordinates-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="modalLatitude">خط العرض (Latitude)</label>
                  <input type="number" id="modalLatitude" step="0.00000001" placeholder="0.0000000" />
                </div>
                <div class="form-group">
                  <label for="modalLongitude">خط الطول (Longitude)</label>
                  <input type="number" id="modalLongitude" step="0.00000001" placeholder="0.0000000" />
                </div>
              </div>
              <div class="form-actions">
                <button id="pullCoordinatesBtn" class="btn btn-secondary" onclick="pullCoordinates()">
                  <span class="btn-icon">📍</span>
                  <span>سحب الإحداثيات</span>
                </button>
                <button id="saveCoordinatesBtn" class="btn btn-primary" onclick="saveCoordinates()">
                  <span class="btn-icon">💾</span>
                  <span>حفظ الإحداثيات</span>
                </button>
              </div>
            </div>
          </div>
          
          <!-- Notes Section -->
          <div class="info-section">
            <h3>الملاحظات</h3>
            <textarea id="modalNotes" class="notes-textarea" rows="4" placeholder="أضف ملاحظات هنا..."></textarea>
          </div>
          
          <!-- Photos Section -->
          <div class="info-section">
            <h3>الصور</h3>
            <div class="photos-upload-area">
              <input type="file" id="photoUploadInput" multiple accept="image/*" style="display: none;" onchange="handlePhotoSelection()" />
              <button class="btn btn-secondary" onclick="document.getElementById('photoUploadInput').click()">
                <span class="btn-icon">📷</span>
                <span>اختيار صور</span>
              </button>
              <button id="uploadPhotosBtn" class="btn btn-primary" onclick="uploadPhotos()" style="display: none;">
                <span class="btn-icon">☁️</span>
                <span>رفع الصور</span>
              </button>
              <div id="selectedPhotosPreview" class="photos-preview"></div>
            </div>
            <div id="existingPhotos" class="existing-photos-grid"></div>
          </div>
        </div>
        
        <div class="modal-footer">
          <button id="returnVehicleBtn" class="btn btn-danger" onclick="returnVehicleFromModal()" style="display: none;">
            <span class="btn-icon">↩️</span>
            <span>إرجاع المركبة</span>
          </button>
          <button class="btn btn-secondary" onclick="closeMovementModal()">إغلاق</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/vehicle_management/assets/js/vehicle_movements.js"></script>
</body>
</html>
