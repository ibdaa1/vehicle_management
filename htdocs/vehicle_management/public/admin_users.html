<!doctype html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>User Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root{
            --brand-accent:#1f6f2b;
            --brand-accent-2:#2e7a2f;
            --card-bg:#ffffff;
            --muted:#6b7280;
            --text:#0d2b16;
            --border:#e6e9eb;
            --btn-ghost-bg:#ffffff;
            --btn-ghost-border:var(--border);
            font-family:"Roboto",system-ui,Arial,sans-serif;
        }
        *{box-sizing:border-box}
        body{font-family:"Roboto",sans-serif;margin:18px;background:#f3f5f7;color:var(--text)}
        .card{background:var(--card-bg);padding:16px;border-radius:10px;border:1px solid var(--border);box-shadow:0 1px 2px rgba(15,23,42,0.03)}
        .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
        .brand{display:flex;gap:12px;align-items:center}
        .logo{height:56px;border-radius:10px;background:linear-gradient(135deg,var(--brand-accent),var(--brand-accent-2));display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700;padding:8px 12px}
        .logo .line1{font-size:14px;letter-spacing:0.6px}
        .logo .line2{font-size:12px;opacity:0.95}
        h2{margin:0;font-size:1.1rem}
        .muted{color:var(--muted);font-size:0.95rem}
        .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;border:0;background:var(--brand-accent);color:#fff;cursor:pointer;font-weight:600}
        .btn.ghost{background:var(--btn-ghost-bg);color:var(--text);border:1px solid var(--btn-ghost-border)}
        .icon-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;background:#fff;border:1px solid var(--border);color:var(--brand-accent);cursor:pointer;font-weight:600}
        .btn.small{padding:6px 10px;font-size:0.85rem}

        /* Filtering Bar */
        .filter-bar{display:flex;gap:12px;align-items:center;margin-bottom:12px;padding:10px;border:1px solid var(--border);border-radius:10px;}
        .filter-bar input{padding:8px 10px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:150px;}
        .filter-active {
            border: 2px solid var(--brand-accent) !important;
            background-color: rgba(31, 111, 43, 0.05) !important;
        }

        /* Table Styles for Responsiveness */
        .table-container{overflow-x:auto;margin-top:12px;}
        table{width:100%;border-collapse:collapse;background:#fff;min-width:1000px;}
        th,td{padding:10px;border-bottom:1px solid #f0f2f4;text-align:left;}
        th{background:#fafafa;font-weight:600}
        td.actions{white-space:nowrap}
        .actions button{margin-right:6px;padding:8px;border-radius:8px;border:0;cursor:pointer;width:40px;height:36px;display:inline-flex;align-items:center;justify-content:center}
        .actions .edit{background:#2563eb;color:#fff}
        .actions .del{background:#ef4444;color:#fff}
        .actions .toggle{background:#10b981;color:#fff}
        .actions .roles{background:#6b7280;color:#fff}
        
        /* Inactive Count Badge */
        #inactive-badge {
            margin-left: 10px;
            padding: 4px 8px;
            background-color: #f44336;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            display: none;
        }
        
        /* Pagination Styles */
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .pagination-info {
            font-size: 0.9rem;
            color: var(--muted);
        }
        .pagination-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .pagination-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-input {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
        }
        .page-size-select {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: white;
        }
        
        /* modal */
        .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:9999}
        .modal{background:var(--card-bg);border-radius:10px;padding:18px;max-width:920px;width:96%;max-height:90vh;overflow:auto;border:1px solid var(--border)}
        .modal h3{margin-top:0}
        .form-row{display:flex;gap:12px;margin-bottom:10px;align-items:center}
        .form-row label{min-width:160px;font-weight:600}
        .form-row input[type="text"],.form-row input[type="email"],.form-row select,.form-row input[type="number"],.form-row input[type="password"]{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px}
        .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
        .small{font-size:0.9rem;color:var(--muted)}
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--brand-accent);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Media Query for Mobile/Tablet */
        @media(max-width:720px){
            .form-row{flex-direction:column;align-items:stretch}
            .form-row label{min-width:unset}
            .topbar{flex-direction:column;align-items:flex-start}
            .controls{width:100%;justify-content:space-around;margin-top:10px;}
            .filter-bar{flex-direction:column;align-items:stretch;}
            .table-container{overflow-x:scroll;}
            body{margin:10px;}
            .pagination-container {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="card topbar">
        <div class="brand">
            <div class="logo" aria-hidden="true">
                <div class="line1">HCS Department</div>
                <div class="line2">Admin</div>
            </div>
            <div>
                <h2>User Management</h2>
                <div class="small">Admin Section — Manage Users and Roles Permissions 
                    <span id="inactive-badge" role="alert"></span>
                </div>
            </div>
        </div>

        <div class="controls" role="toolbar" aria-label="admin-actions">
            <a class="icon-btn" title="Role Permissions" href="admin_roles.html"><i class="fa fa-user-shield"></i> Roles</a>
            <button id="refreshBtn" class="btn ghost" title="Refresh List"><i class="fa fa-arrows-rotate"></i> Refresh</button>
            <a href="index.html" class="btn ghost" title="Back"><i class="fa fa-arrow-left"></i> Back</a>
        </div>
    </div>

    <div class="card" style="margin-top:12px">
        <div class="filter-bar">
            <label for="empIdFilter" style="font-weight:600; margin:0;">Filter by Employee ID:</label>
            <input type="text" id="empIdFilter" placeholder="Enter Employee ID (exact match)">
            <select id="sectorFilterSelect" style="padding:8px 10px;border:1px solid var(--border);border-radius:8px;min-width:150px;">
                <option value="">All Sectors</option>
            </select>
            <button id="applyFilterBtn" class="btn" title="Apply Filter"><i class="fa fa-filter"></i> Filter</button>
            <button id="clearFilterBtn" class="btn ghost" title="Clear Filter" style="color:red"><i class="fa fa-times"></i> Clear</button>
        </div>

        <div class="muted" id="desc">Loading Users…</div>
        
        <div class="table-container" id="usersWrap">
            <table id="usersTable" aria-live="polite" role="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Emp. ID</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Sector</th>
                        <th>Department</th>
                        <th>Section</th>
                        <th>Division</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            
            <!-- Pagination Container -->
            <div id="paginationContainer" class="pagination-container" style="display:none;">
                <div class="pagination-info" id="paginationInfo"></div>
                <div class="pagination-controls">
                    <button id="firstPageBtn" class="btn ghost small" title="First Page"><i class="fa fa-angle-double-left"></i></button>
                    <button id="prevPageBtn" class="btn ghost small" title="Previous Page"><i class="fa fa-angle-left"></i></button>
                    
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span class="small">Page</span>
                        <input type="number" id="pageInput" class="page-input" min="1" value="1">
                        <span class="small" id="totalPages">of 1</span>
                    </div>
                    
                    <button id="nextPageBtn" class="btn ghost small" title="Next Page"><i class="fa fa-angle-right"></i></button>
                    <button id="lastPageBtn" class="btn ghost small" title="Last Page"><i class="fa fa-angle-double-right"></i></button>
                    
                    <select id="pageSizeSelect" class="page-size-select" title="Items per page">
                        <option value="10">10 per page</option>
                        <option value="25">25 per page</option>
                        <option value="50" selected>50 per page</option>
                        <option value="100">100 per page</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
        <div class="modal" role="document" aria-labelledby="modalTitle">
            <h3 id="modalTitle">Edit User</h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button id="modalCancel" class="btn ghost">Cancel</button>
                <button id="modalSave" class="btn">Save</button>
            </div>
        </div>
    </div>

<script src="session_check.js"></script>
<script>
// ملف JavaScript مع دعم التقسيم الكامل والتصفية بالضبط
const AdminUsers = (function(){
    const API_BASE = '/vehicle_management/api/v1/users';
    const ROLES_API = '/vehicle_management/api/v1/roles';
    const REFS_HELPER = '/vehicle_management/api/v1/references';
    
    let currentRoles = [];
    let currentSectors = [];
    let currentLang = 'ar';
    let currentPage = 1;
    let perPage = 50;
    let totalPages = 1;
    let totalUsers = 0;
    let currentFilter = '';
    let currentSectorFilter = '';
    
    function log(...a) {
        try {
            console.debug('[AdminUsers]', ...a);
        } catch(e) {}
    }
    
    function escapeHTML(s) {
        if(s == null) return '';
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;',
            '"': '&quot;', "'": '&#39;'
        })[c]);
    }
    
    const ReferencesCascade = (function() {
        async function fetchRefs(type, parent_id, lang = 'ar') {
            let url = REFS_HELPER + '?lang=' + encodeURIComponent(lang) + '&type=' + encodeURIComponent(type);
            if(parent_id) url += '&parent_id=' + encodeURIComponent(parent_id);
            const res = await fetch(url, {credentials: 'same-origin'});
            try {
                return await res.json();
            } catch(e) {
                return {success: false, message: 'Invalid response'};
            }
        }
        
        function emptySelect(sel, placeholder = '-- اختر --') {
            sel.innerHTML = '';
            const o = document.createElement('option');
            o.value = '';
            o.textContent = placeholder;
            sel.appendChild(o);
        }
        
        async function fillSelect(sel, items, lang) {
            emptySelect(sel, lang === 'en' ? '-- Select --' : '-- اختر --');
            items.forEach(it => {
                const o = document.createElement('option');
                o.value = it.id;
                const nameField = lang === 'en' ? (it.name_en || it.name_ar) : (it.name_ar || it.name_en);
                o.textContent = nameField || it.name || ('#' + it.id);
                sel.appendChild(o);
            });
        }
        
        function bind(depSelQuery, secSelQuery, divSelQuery, opts = {}) {
            const lang = opts.lang || 'ar';
            const d = document.querySelector(depSelQuery);
            const s = document.querySelector(secSelQuery);
            const dv = document.querySelector(divSelQuery);
            if(!d || !s || !dv) return console.warn('ReferencesCascade: select(s) not found');
            
            (async() => {
                const j = await fetchRefs('departments', null, lang);
                const items = j.departments || j.items || [];
                await fillSelect(d, items, lang);
                if(d.dataset.selected) d.value = d.dataset.selected;
                if(d.value) d.dispatchEvent(new Event('change'));
            })();
            
            d.addEventListener('change', async function() {
                const depId = this.value || null;
                emptySelect(dv, lang === 'en' ? '-- Select --' : '-- اختر --');
                const j = await fetchRefs('sections', depId, lang);
                const items = j.sections || j.items || [];
                await fillSelect(s, items, lang);
                if(s.dataset.selected) {
                    s.value = s.dataset.selected;
                    s.removeAttribute('data-selected');
                }
                if(s.value) s.dispatchEvent(new Event('change'));
            });
            
            s.addEventListener('change', async function() {
                const secId = this.value || null;
                const j = await fetchRefs('divisions', secId, lang);
                const items = j.divisions || j.items || [];
                await fillSelect(dv, items, lang);
                if(dv.dataset.selected) {
                    dv.value = dv.dataset.selected;
                    dv.removeAttribute('data-selected');
                }
            });
        }
        
        return {bind, fillSelect, emptySelect};
    })();
    
    function ensureModalExists() {
        if(document.getElementById('modalBackdrop')) return;
        
        const backdrop = document.createElement('div');
        backdrop.id = 'modalBackdrop';
        backdrop.className = 'modal-backdrop';
        backdrop.style.display = 'none';
        backdrop.innerHTML = `
            <div class="modal" role="document" aria-labelledby="modalTitle">
                <h3 id="modalTitle"></h3>
                <div id="modalBody"></div>
                <div class="modal-actions" style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
                    <button id="modalCancel" class="btn ghost">إلغاء</button>
                    <button id="modalSave" class="btn">حفظ</button>
                </div>
            </div>
        `;
        document.body.appendChild(backdrop);
        log('Modal created dynamically');
    }
    
    function modalBackdropEl() {
        return document.getElementById('modalBackdrop');
    }
    
    function modalBodyEl() {
        return document.getElementById('modalBody');
    }
    
    function modalTitleEl() {
        return document.getElementById('modalTitle');
    }
    
    function showModal() {
        const mb = modalBackdropEl();
        if(mb) mb.style.display = 'flex';
    }
    
    function closeModal() {
        const mb = modalBackdropEl();
        if(mb) mb.style.display = 'none';
        if(modalBodyEl()) modalBodyEl().innerHTML = '';
    }
    
    async function api(path, opts = {}) {
        opts.credentials = 'same-origin';
        opts.headers = Object.assign({
            'Accept': 'application/json'
        }, opts.headers || {});
        
        const res = await fetch(API_BASE + '/' + path, opts);
        try {
            return await res.json();
        } catch(e) {
            return {success: false, message: 'Invalid response', status: res.status};
        }
    }
    
    async function fetchRoles() {
        try {
            const res = await fetch(ROLES_API, {credentials: 'same-origin'});
            const j = await res.json();
            if(j && j.success) return j.roles || [];
        } catch(e) {
            log('fetchRoles error', e);
        }
        return [];
    }
    
    async function fetchSectors() {
        try {
            const res = await fetch(REFS_HELPER + '?type=sectors&lang=' + encodeURIComponent(currentLang), {credentials: 'same-origin'});
            const j = await res.json();
            if(j && j.success) return j.sectors || [];
        } catch(e) {
            log('fetchSectors error', e);
        }
        return [];
    }
    
    function sectorLabel(sectorId) {
        const sid = parseInt(sectorId, 10);
        if(!sid) return '';
        const s = currentSectors.find(x => parseInt(x.id, 10) === sid);
        return s ? (s.name || ('#' + sid)) : ('#' + sid);
    }
    
    function roleLabel(r) {
        const rId = parseInt(r, 10);
        if(rId === 1) return 'Super Admin';
        if(rId === 2) return 'Admin';
        const rr = currentRoles.find(x => parseInt(x.id, 10) === rId);
        const name = currentLang === 'ar' ? (rr?.name_ar || rr?.name_en) : (rr?.name_en || rr?.name_ar);
        return name || ('Role ' + rId);
    }
    
    function updatePaginationUI(pagination) {
        const container = document.getElementById('paginationContainer');
        const info = document.getElementById('paginationInfo');
        const totalPagesSpan = document.getElementById('totalPages');
        const pageInput = document.getElementById('pageInput');
        const pageSizeSelect = document.getElementById('pageSizeSelect');
        
        if (!pagination || !container || !info) return;
        
        totalPages = pagination.total_pages || 1;
        totalUsers = pagination.total || 0;
        currentPage = pagination.page || 1;
        
        // إظهار/إخفاء التقسيم
        container.style.display = totalPages > 1 ? 'flex' : 'none';
        
        // تحديث المعلومات
        if (currentLang === 'en') {
            info.textContent = `Showing ${((currentPage - 1) * perPage) + 1} to ${Math.min(currentPage * perPage, totalUsers)} of ${totalUsers} users`;
        } else {
            info.textContent = `عرض ${((currentPage - 1) * perPage) + 1} إلى ${Math.min(currentPage * perPage, totalUsers)} من ${totalUsers} مستخدم`;
        }
        
        // تحديث عناصر التحكم
        if (totalPagesSpan) totalPagesSpan.textContent = `من ${totalPages}`;
        if (pageInput) {
            pageInput.value = currentPage;
            pageInput.max = totalPages;
        }
        
        // تحديث أزرار التنقل
        document.getElementById('firstPageBtn').disabled = currentPage <= 1;
        document.getElementById('prevPageBtn').disabled = currentPage <= 1;
        document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
        document.getElementById('lastPageBtn').disabled = currentPage >= totalPages;
        
        // تحديث حجم الصفحة
        if (pageSizeSelect) pageSizeSelect.value = perPage;
        
        // تحديث حالة حقل التصفية
        const filterInput = document.getElementById('empIdFilter');
        if (filterInput) {
            if (currentFilter) {
                filterInput.classList.add('filter-active');
                filterInput.title = currentLang === 'en' ? 
                    `Filter active: ${currentFilter}` : 
                    `التصفية نشطة: ${currentFilter}`;
            } else {
                filterInput.classList.remove('filter-active');
                filterInput.title = '';
            }
        }
    }
    
    function renderUsers(rows) {
        const tbody = document.querySelector('#usersTable tbody');
        if(!tbody) return;
        
        tbody.innerHTML = '';
        
        rows.forEach(u => {
            const isActive = parseInt(u.is_active || 0, 10) === 1;
            
            const depName = currentLang === 'en' ? (u.department_name_en || u.department_name_ar) : (u.department_name_ar || u.department_name_en);
            const secName = currentLang === 'en' ? (u.section_name_en || u.section_name_ar) : (u.section_name_ar || u.section_name_en);
            const divName = currentLang === 'en' ? (u.division_name_en || u.division_name_ar) : (u.division_name_ar || u.division_name_en);
            const sectorName = u.sector_name || sectorLabel(u.sector_id);
            
            const statusText = currentLang === 'en' ? (isActive ? 'Active' : 'Inactive') : (isActive ? 'مفعل' : 'معطّل');
            const toggleTitle = currentLang === 'en' ? (isActive ? 'Deactivate' : 'Activate') : (isActive ? 'تعطيل' : 'تفعيل');
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${escapeHTML(u.display_name || u.username)}</td>
                <td>${escapeHTML(u.emp_id || '')}</td>
                <td>${escapeHTML(u.email || '')}</td>
                <td>${escapeHTML(u.phone || '')}</td>
                <td>${escapeHTML(roleLabel(u.role_id))}</td>
                <td>${escapeHTML(sectorName || u.sector_id || '')}</td>
                <td>${escapeHTML(depName || u.department_id || '')}</td>
                <td>${escapeHTML(secName || u.section_id || '')}</td>
                <td>${escapeHTML(divName || u.division_id || '')}</td>
                <td><span style="color:${isActive ? 'green' : 'red'};font-weight:600;">${statusText}</span></td>
                <td class="actions">
                    <button data-id="${u.id}" class="edit" title="${currentLang === 'en' ? 'Edit' : 'تعديل'}"><i class="fa fa-edit"></i></button>
                    <button data-id="${u.id}" class="del" title="${currentLang === 'en' ? 'Delete' : 'حذف'}"><i class="fa fa-trash"></i></button>
                    <button data-id="${u.id}" class="toggle" title="${toggleTitle}"><i class="fa fa-user-check"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }
    
    function buildForm(user) {
        ensureModalExists();
        const lang = currentLang;
        
        const fields = [
            {key: 'username', label_ar: 'الاسم الظاهر', label_en: 'Display Name', type: 'text'},
            {key: 'emp_id', label_ar: 'الرمز الوظيفي', label_en: 'Employee ID', type: 'text'},
            {key: 'email', label_ar: 'البريد الإلكتروني', label_en: 'Email', type: 'email'},
            {key: 'phone', label_ar: 'الهاتف', label_en: 'Phone', type: 'text'},
            {key: 'password', label_ar: 'كلمة المرور الجديدة', label_en: 'New Password', type: 'password'},
            {key: 'confirm_password', label_ar: 'تأكيد كلمة المرور', label_en: 'Confirm Password', type: 'password'},
            {key: 'preferred_language', label_ar: 'اللغة المفضلة', label_en: 'Preferred Language', type: 'select', options: [{v: 'ar', t: 'عربى'}, {v: 'en', t: 'English'}]},
            {key: 'role_id', label_ar: 'الدور', label_en: 'Role', type: 'select_roles'},
            {key: 'is_active', label_ar: 'مفعل', label_en: 'Is Active', type: 'checkbox'},
            {key: 'sector_id', label_ar: 'القطاع', label_en: 'Sector', type: 'select_sectors', id: 'sectorSelect'},
            {key: 'department_id', label_ar: 'الإدارة', label_en: 'Department', type: 'select_ref', ref: 'departments', id: 'depSelect'},
            {key: 'section_id', label_ar: 'القسم', label_en: 'Section', type: 'select_ref', ref: 'sections', id: 'secSelect'},
            {key: 'division_id', label_ar: 'الوحدة', label_en: 'Division', type: 'select_ref', ref: 'divisions', id: 'divSelect'}
        ];
        
        const formElement = document.createElement('form');
        formElement.id = 'editForm';
        formElement.addEventListener('submit', (e) => e.preventDefault());
        
        fields.forEach(f => {
            const labelText = lang === 'en' ? (f.label_en || f.label_ar) : (f.label_ar || f.label_en);
            const initialValue = user[f.key] ?? '';
            
            const row = document.createElement('div');
            row.className = 'form-row';
            
            const label = document.createElement('label');
            label.textContent = labelText;
            
            const controlWrap = document.createElement('div');
            controlWrap.style.flex = '1';
            
            if(f.type === 'text' || f.type === 'email' || f.type === 'password') {
                const inp = document.createElement('input');
                inp.type = f.type;
                inp.name = f.key;
                
                if(f.key === 'username') {
                    inp.value = user.username || user.display_name || '';
                } else if(f.key === 'password' || f.key === 'confirm_password') {
                    inp.value = '';
                    inp.placeholder = lang === 'en' ? 
                        'Enter new password (min 8 chars)' : 
                        'أدخل كلمة مرور جديدة (8 أحرف على الأقل)';
                    inp.minLength = 8;
                } else {
                    inp.value = initialValue;
                }
                
                controlWrap.appendChild(inp);
            } else if(f.type === 'select') {
                const sel = document.createElement('select');
                sel.name = f.key;
                f.options.forEach(op => {
                    const o = document.createElement('option');
                    o.value = op.v;
                    o.textContent = op.t;
                    if((initialValue + '') === (op.v + '')) o.selected = true;
                    sel.appendChild(o);
                });
                controlWrap.appendChild(sel);
            } else if(f.type === 'select_roles') {
                const sel = document.createElement('select');
                sel.name = f.key;
                const emptyText = lang === 'en' ? '-- Select --' : '-- اختر --';
                const emptyOpt = document.createElement('option');
                emptyOpt.value = '';
                emptyOpt.textContent = emptyText;
                sel.appendChild(emptyOpt);
                
                (currentRoles || []).forEach(r => {
                    const o = document.createElement('option');
                    o.value = r.id;
                    o.textContent = (lang === 'en' ? (r.name_en || r.name_ar) : (r.name_ar || r.name_en) || ('Role ' + r.id));
                    if(parseInt(user.role_id || 0, 10) === parseInt(r.id, 10)) o.selected = true;
                    sel.appendChild(o);
                });
                
                controlWrap.appendChild(sel);
            } else if(f.type === 'checkbox') {
                const chk = document.createElement('input');
                chk.type = 'checkbox';
                chk.name = f.key;
                chk.checked = (parseInt(initialValue || 0, 10) === 1);
                controlWrap.appendChild(chk);
            } else if(f.type === 'select_sectors') {
                const sel = document.createElement('select');
                sel.name = f.key;
                sel.id = f.id;
                const emptyText = lang === 'en' ? '-- Select Sector --' : '-- اختر القطاع --';
                const emptyOpt = document.createElement('option');
                emptyOpt.value = '';
                emptyOpt.textContent = emptyText;
                sel.appendChild(emptyOpt);
                
                (currentSectors || []).forEach(s => {
                    const o = document.createElement('option');
                    o.value = s.id;
                    o.textContent = s.name || ('#' + s.id);
                    if(parseInt(user.sector_id || 0, 10) === parseInt(s.id, 10)) o.selected = true;
                    sel.appendChild(o);
                });
                
                controlWrap.appendChild(sel);
            } else if(f.type === 'select_ref') {
                const sel = document.createElement('select');
                sel.name = f.key;
                sel.id = f.id;
                sel.setAttribute('data-selected', initialValue);
                
                const emptyOpt = document.createElement('option');
                emptyOpt.value = '';
                emptyOpt.textContent = lang === 'en' ? '-- Select --' : '-- اختر --';
                sel.appendChild(emptyOpt);
                
                controlWrap.appendChild(sel);
            }
            
            row.appendChild(label);
            row.appendChild(controlWrap);
            formElement.appendChild(row);
        });
        
        const hid = document.createElement('input');
        hid.type = 'hidden';
        hid.name = 'id';
        hid.value = user.id;
        formElement.appendChild(hid);
        
        // إضافة ملاحظة عن كلمة المرور
        const note = document.createElement('div');
        note.className = 'small';
        note.style.marginTop = '10px';
        note.style.color = '#666';
        note.textContent = lang === 'en' ? 
            'Note: Leave password fields empty to keep current password' :
            'ملاحظة: اترك حقول كلمة المرور فارغة للحفاظ على كلمة المرور الحالية';
        formElement.appendChild(note);
        
        modalTitleEl().textContent = (lang === 'en' ? 'Edit User: ' : 'تعديل المستخدم: ') + (user.display_name || user.username || user.id);
        modalBodyEl().innerHTML = '';
        modalBodyEl().appendChild(formElement);
        
        ReferencesCascade.bind('#depSelect', '#secSelect', '#divSelect', {lang: currentLang});
    }
    
    async function submitModalForm() {
        try {
            const form = document.getElementById('editForm');
            if(!form) {
                log('submitModalForm: editForm not found');
                alert('لم يتم العثور على النموذج');
                return;
            }
            
            const fd = new FormData(form);
            
            // التحقق من كلمات المرور
            const newPassword = form.querySelector('input[name="password"]').value;
            const confirmPassword = form.querySelector('input[name="confirm_password"]').value;
            
            if(newPassword || confirmPassword) {
                if(newPassword !== confirmPassword) {
                    alert(currentLang === 'en' ? 
                        'Passwords do not match' : 
                        'كلمات المرور غير متطابقة');
                    return;
                }
                
                if(newPassword.length < 8) {
                    alert(currentLang === 'en' ? 
                        'Password must be at least 8 characters' : 
                        'يجب أن تكون كلمة المرور 8 أحرف على الأقل');
                    return;
                }
                
                const confirmReset = currentLang === 'en' ?
                    'Are you sure you want to reset the password? This will replace the current password.' :
                    'هل أنت متأكد من إعادة تعيين كلمة المرور؟ سيتم استبدال كلمة المرور الحالية.';
                
                if(!confirm(confirmReset)) {
                    return;
                }
                
                fd.append('password', newPassword);
            }
            
            fd.delete('confirm_password');
            
            Array.from(form.querySelectorAll('input[type=checkbox]')).forEach(cb => {
                if(cb.name && !fd.has(cb.name)) fd.append(cb.name, '0');
                else if(cb.name) fd.set(cb.name, cb.checked ? '1' : '0');
            });
            
            const url = API_BASE + '/update.php';
            log('POST ->', url);
            const res = await fetch(url, {method: 'POST', credentials: 'same-origin', body: fd});
            
            let j;
            try {
                j = await res.json();
            } catch(e) {
                j = {success: false, message: 'Invalid JSON or non-200 status', status: res.status};
            }
            
            log('server response', j);
            
            if(j && j.success) {
                let successMsg = currentLang === 'en' ? 'Saved successfully' : 'تم الحفظ بنجاح';
                if(j.password_updated) {
                    successMsg += currentLang === 'en' ? 
                        ' (Password has been reset)' : 
                        ' (تم إعادة تعيين كلمة المرور)';
                }
                alert(successMsg);
                closeModal();
                load(currentFilter, currentPage);
            } else {
                const failureMsg = currentLang === 'en' ? 'Save failed: ' : 'فشل الحفظ: ';
                alert(failureMsg + (j.message || (currentLang === 'en' ? 'Check server response log' : 'راجع سجل استجابة الخادم')));
            }
        } catch(e) {
            console.error(e);
            alert((currentLang === 'en' ? 'Submission error: ' : 'خطأ أثناء الإرسال: ') + (e.message || e));
        }
    }
    
    function setupDelegation() {
        document.addEventListener('click', async function(e) {
            const btn = e.target.closest && e.target.closest('button');
            if(!btn) return;
            
            const id = btn.getAttribute('data-id');
            if(!id) return;
            
            if(btn.classList.contains('edit')) {
                ensureModalExists();
                modalBodyEl().innerHTML = `<div class="small">${currentLang === 'en' ? 'Loading…' : 'جاري التحميل…'}</div>`;
                showModal();
                
                try {
                    currentRoles = await fetchRoles();
                    currentSectors = await fetchSectors();
                    const userRes = await api('get.php?id=' + encodeURIComponent(id));
                    if(!userRes || !userRes.success) {
                        const errMsg = currentLang === 'en' ? 
                            (userRes?.message || 'Error loading user data') : 
                            (userRes?.message || 'خطأ في تحميل بيانات المستخدم');
                        modalBodyEl().innerHTML = `<div class="small" style="color:red">${escapeHTML(errMsg)}</div>`;
                        return;
                    }
                    buildForm(userRes.user);
                } catch(err) {
                    const errMsg = currentLang === 'en' ? 'Error: ' + (err.message || err) : 'خطأ: ' + (err.message || err);
                    modalBodyEl().innerHTML = `<div class="small" style="color:red">${escapeHTML(errMsg)}</div>`;
                }
                return;
            }
            
            if(btn.classList.contains('del')) {
                const confirmMsg = currentLang === 'en' ? 
                    'Are you sure you want to permanently delete this user?' : 
                    'هل تريد حذف المستخدم نهائياً؟';
                if(!confirm(confirmMsg)) return;
                
                const fd = new FormData();
                fd.append('id', id);
                const res = await api('delete.php', {method: 'POST', body: fd});
                const successMsg = currentLang === 'en' ? 'User deleted successfully' : 'تم الحذف';
                const failureMsg = currentLang === 'en' ? 'Deletion failed' : 'فشل الحذف';
                if(res && res.success) {
                    alert(successMsg);
                    load(currentFilter, currentPage);
                } else alert(res.message || failureMsg);
                return;
            }
            
            if(btn.classList.contains('toggle')) {
                const fd = new FormData();
                fd.append('id', id);
                const res = await api('activate.php', {method: 'POST', body: fd});
                const successMsg = currentLang === 'en' ? 'Status changed successfully' : 'تم التغيير';
                const failureMsg = currentLang === 'en' ? 'Operation failed' : 'فشل العملية';
                if(res && res.success) {
                    alert(successMsg);
                    load(currentFilter, currentPage);
                } else alert(res.message || failureMsg);
                return;
            }
        });
    }
    
    async function load(filterEmpId = null, page = 1) {
        const desc = document.getElementById('desc');
        if(desc) desc.textContent = currentLang === 'en' ? 'Loading…' : 'جاري التحميل…';
        
        try {
            if(typeof window.sessionCheck === 'function') {
                const s = await window.sessionCheck();
                if(s && s.success && s.user && s.user.preferred_language) {
                    currentLang = (s.user.preferred_language || 'ar').toLowerCase();
                }
            }
            currentRoles = await fetchRoles();
            currentSectors = await fetchSectors();
            
            // Populate sector filter dropdown
            const sectorFilterSel = document.getElementById('sectorFilterSelect');
            if(sectorFilterSel && currentSectors.length > 0) {
                const firstOpt = sectorFilterSel.options[0];
                sectorFilterSel.innerHTML = '';
                sectorFilterSel.appendChild(firstOpt);
                currentSectors.forEach(s => {
                    const o = document.createElement('option');
                    o.value = s.id;
                    o.textContent = s.name || ('#' + s.id);
                    sectorFilterSel.appendChild(o);
                });
            }
        } catch(e) {
            currentRoles = [];
            currentSectors = [];
        }
        
        // بناء URL مع معلمات التقسيم والتصفية
        let url = `list.php?page=${page}&per_page=${perPage}`;
        if (filterEmpId) {
            url += `&emp_id=${encodeURIComponent(filterEmpId)}`;
        }
        if (currentSectorFilter) {
            url += `&sector_id=${encodeURIComponent(currentSectorFilter)}`;
        }
        
        const res = await api(url);
        if(!res || !res.success) {
            const errMsg = currentLang === 'en' ? 
                (res ? (res.message || 'Loading error') : 'Loading error') : 
                (res ? (res.message || 'خطأ في التحميل') : 'خطأ في التحميل');
            if(desc) desc.textContent = errMsg;
            renderUsers([]);
            updatePaginationUI();
            return;
        }
        
        let users = res.users || [];
        totalPages = res.pagination?.total_pages || 1;
        totalUsers = res.pagination?.total || 0;
        currentPage = res.pagination?.page || 1;
        
        // تحديث وصف النتائج مع معلومات التصفية
        if(desc) {
            if(currentLang === 'en') {
                if (filterEmpId) {
                    desc.textContent = `Found ${users.length} user(s) with Employee ID: ${filterEmpId}`;
                } else {
                    desc.textContent = `Loaded ${users.length} users (page ${currentPage} of ${totalPages})`;
                }
            } else {
                if (filterEmpId) {
                    desc.textContent = `تم العثور على ${users.length} مستخدم(ين) بالرقم الوظيفي: ${filterEmpId}`;
                } else {
                    desc.textContent = `تم تحميل ${users.length} مستخدم (الصفحة ${currentPage} من ${totalPages})`;
                }
            }
        }
        
        renderUsers(users);
        updatePaginationUI(res.pagination);
    }
    
    function filterList(empId) {
        currentFilter = empId;
        load(empId, 1);
    }
    
    function setupModalListeners() {
        const backdrop = document.getElementById('modalBackdrop');
        const cancelButton = document.getElementById('modalCancel');
        const saveButton = document.getElementById('modalSave');
        
        if(backdrop) backdrop.addEventListener('click', (e) => {
            if(e.target === backdrop) closeModal();
        });
        
        if(cancelButton) cancelButton.addEventListener('click', (e) => {
            e.preventDefault();
            closeModal();
        });
        
        if(saveButton) saveButton.addEventListener('click', (e) => {
            e.preventDefault();
            submitModalForm();
        });
        
        log('Modal listeners attached successfully in init().');
    }
    
    function setupPaginationListeners() {
        // أول صفحة
        document.getElementById('firstPageBtn').addEventListener('click', () => {
            load(currentFilter, 1);
        });
        
        // صفحة سابقة
        document.getElementById('prevPageBtn').addEventListener('click', () => {
            if (currentPage > 1) {
                load(currentFilter, currentPage - 1);
            }
        });
        
        // صفحة تالية
        document.getElementById('nextPageBtn').addEventListener('click', () => {
            if (currentPage < totalPages) {
                load(currentFilter, currentPage + 1);
            }
        });
        
        // آخر صفحة
        document.getElementById('lastPageBtn').addEventListener('click', () => {
            load(currentFilter, totalPages);
        });
        
        // إدخال رقم الصفحة
        document.getElementById('pageInput').addEventListener('change', (e) => {
            let page = parseInt(e.target.value);
            if (isNaN(page) || page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            load(currentFilter, page);
        });
        
        // تغيير حجم الصفحة
        document.getElementById('pageSizeSelect').addEventListener('change', (e) => {
            perPage = parseInt(e.target.value);
            load(currentFilter, 1);
        });
    }
    
    function init() {
        ensureModalExists();
        setupDelegation();
        setupModalListeners();
        setupPaginationListeners();
        
        const refreshBtn = document.getElementById('refreshBtn');
        if(refreshBtn) refreshBtn.addEventListener('click', () => load(currentFilter, currentPage));
        
        const applyFilterBtn = document.getElementById('applyFilterBtn');
        const empIdFilter = document.getElementById('empIdFilter');
        if(applyFilterBtn && empIdFilter) {
            applyFilterBtn.addEventListener('click', () => {
                const filterValue = empIdFilter.value.trim();
                if (filterValue) {
                    filterList(filterValue);
                } else {
                    alert(currentLang === 'en' ? 
                        'Please enter an Employee ID to filter' : 
                        'يرجى إدخال الرقم الوظيفي للتصفية');
                }
            });
            
            // السماح بالبحث عند الضغط على Enter
            empIdFilter.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const filterValue = empIdFilter.value.trim();
                    if (filterValue) {
                        filterList(filterValue);
                    }
                }
            });
        }
        
        const clearFilterBtn = document.getElementById('clearFilterBtn');
        if(clearFilterBtn && empIdFilter) {
            clearFilterBtn.addEventListener('click', () => {
                empIdFilter.value = '';
                const sectorFilterSel = document.getElementById('sectorFilterSelect');
                if(sectorFilterSel) sectorFilterSel.value = '';
                currentSectorFilter = '';
                filterList('');
            });
        }
        
        // Sector filter event
        const sectorFilterSel = document.getElementById('sectorFilterSelect');
        if(sectorFilterSel) {
            sectorFilterSel.addEventListener('change', () => {
                currentSectorFilter = sectorFilterSel.value;
                load(currentFilter, 1);
            });
        }
        
        load();
        log('AdminUsers initialized with pagination and exact filtering support');
    }
    
    return {
        init,
        load,
        filterList
    };
})();

// Logic to initialize the admin users list and enforce role checks
(async function(){
    const s = await sessionCheck();
    if (!s || !s.success) return location.href='login.html';
    const role = parseInt(s.user.role_id || 0, 10);
    if (![1,2].includes(role)) {
        const message = currentLang === 'en' ? 
            '<div style="padding:20px">Unauthorized. This page is restricted to administrators only.</div>' :
            '<div style="padding:20px">غير مصرح. هذه الصفحة مقصورة على المسؤولين فقط.</div>';
        document.body.innerHTML = message;
        return;
    }
    
    // Add filtering logic event listeners
    const empIdFilter = document.getElementById('empIdFilter');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');

    if (typeof AdminUsers !== 'undefined' && AdminUsers.filterList) {
        applyFilterBtn.addEventListener('click', () => {
            const filterValue = empIdFilter.value.trim();
            AdminUsers.filterList(filterValue);
        });

        clearFilterBtn.addEventListener('click', () => {
            empIdFilter.value = '';
            AdminUsers.filterList('');
        });
        
        AdminUsers.init();
    } else {
        console.error("AdminUsers module is not loaded correctly or missing filterList.");
    }
})();
</script>
