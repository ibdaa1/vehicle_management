<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تقرير صيانة المركبات</title>
  <link rel="stylesheet" href="/vehicle_management/assets/css/Vehicle_Maintenance.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background: white; } /* Clean for report */
    .report-container { max-width: 100%; margin: 0; padding: 20px; }
    .report-header { text-align: center; margin-bottom: 20px; }
    .report-actions { text-align: center; margin-bottom: 20px; }
    /* Print-specific styles for single page */
    @media print {
      body { 
        margin: 0; 
        padding: 10px; 
        font-size: 8pt; 
        -webkit-print-color-adjust: exact; 
      }
      .report-container { 
        max-width: none; 
        padding: 5mm; 
        box-sizing: border-box; 
      }
      .report-header { 
        margin-bottom: 10px; 
        page-break-after: avoid; 
      }
      .report-header h1 { 
        font-size: 14pt; 
        margin: 0 0 5px 0; 
      }
      .report-header .subtitle { 
        font-size: 9pt; 
      }
      .report-actions { 
        display: none; 
      }
      .results-section { 
        margin: 0; 
      }
      .results-header h2 { 
        font-size: 10pt; 
        margin: 0 0 5px 0; 
        page-break-after: avoid; 
      }
      .table-container { 
        overflow: visible; 
        margin: 0; 
        box-shadow: none; 
        border-radius: 0; 
      }
      .maintenance-table.report-table { 
        font-size: 7pt; 
        width: 100%; 
        table-layout: fixed; 
        border-collapse: collapse; 
      }
      .maintenance-table th, 
      .maintenance-table td { 
        padding: 2px 1px; 
        border: 0.5pt solid #000; 
        text-align: center; 
        vertical-align: middle; 
        word-wrap: break-word; 
        overflow: hidden; 
        page-break-inside: avoid; 
      }
      .maintenance-table th:nth-child(9),
      .maintenance-table td:nth-child(9),
      .maintenance-table th:nth-child(10),
      .maintenance-table td:nth-child(10),
      .maintenance-table th:nth-child(11),
      .maintenance-table td:nth-child(11),
      .maintenance-table th:nth-child(16),
      .maintenance-table td:nth-child(16) { /* Notes column */
        max-width: 80px; 
        font-size: 6pt; 
        line-height: 1.1; 
      }
      .type-badge { 
        font-size: 6pt; 
        padding: 1px 2px; 
      }
      @page { 
        size: A4 landscape; 
        margin: 5mm; 
      }
      /* Ensure single page if possible */
      .maintenance-table tr { 
        page-break-inside: avoid; 
      }
    }
    /* Screen preview in landscape-like */
    @media screen and (min-width: 1200px) {
      body { 
        transform: rotate(90deg) translateY(-100vh); 
        transform-origin: left top; 
        width: 100vh; 
        height: 100vw; 
        overflow: hidden; 
      }
    }
  </style>
</head>
<body>
  <div class="report-container">
    <div class="report-header">
      <h1>تقرير صيانة المركبات</h1>
      <div class="subtitle">تاريخ التقرير: <span id="reportDate"></span></div>
    </div>
    <div class="report-actions">
      <button id="printReportBtn" class="btn info" title="طباعة"><i class="fas fa-print"></i> طباعة</button>
      <button id="backBtn" class="btn ghost" onclick="window.close()" title="إغلاق"><i class="fas fa-times"></i> إغلاق</button>
    </div>
    <div id="resultsSection" class="results-section">
      <div class="results-header">
        <h2>نتائج التقرير (<span id="totalCount">0</span>)</h2>
      </div>
      <div class="table-container">
        <table id="maintenanceTable" class="maintenance-table report-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>رقم المركبة</th>
              <th>السائق</th>
              <th>هاتف السائق</th>
              <th>الحالة</th>
              <th>سنة الصنع</th>
              <th>ID الموظف</th>
              <th>النوع</th>
              <th>الإدارة</th>
              <th>القسم</th>
              <th>الشعبة</th>
              <th>تاريخ الزيارة</th>
              <th>الزيارة القادمة</th>
              <th>نوع الصيانة</th>
              <th>الموقع</th>
              <th>الملاحظات</th> <!-- Added notes column -->
            </tr>
          </thead>
          <tbody id="maintenanceTableBody">
            <!-- Results inserted by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    // Enhanced JS for report - Load references and vehicles for full data enhancement
    const urlParams = new URLSearchParams(window.location.search);
    const q = urlParams.get('q') || '';
    const type = urlParams.get('type') || '';
    const dept = urlParams.get('department_id') || '';
    const section = urlParams.get('section_id') || '';
    const division = urlParams.get('division_id') || '';
    const from = urlParams.get('from_date') || '';
    const to = urlParams.get('to_date') || '';
   
    const API_MAINTENANCE = '/vehicle_management/api/vehicle/Vehicle_Maintenance.php';
    const API_VEHICLES = '/vehicle_management/api/vehicle/list.php';
    const API_REFERENCES = '/vehicle_management/api/helper/get_references.php';
    const maintenanceTableBody = document.getElementById('maintenanceTableBody');
    const totalCount = document.getElementById('totalCount');
    const printReportBtn = document.getElementById('printReportBtn');
    const reportDate = document.getElementById('reportDate');
    const resultsSection = document.getElementById('resultsSection');
   
    let currentLang = 'ar';
    let translations = {};
    let vehiclesData = {}; 
    let deptMap = {}; 
    let sectionMap = {}; 
    let divisionMap = {}; 
   
    reportDate.textContent = new Date().toLocaleDateString('ar-SA');
    resultsSection.style.display = 'block'; // Show immediately
   
    async function fetchJson(url, opts = {}) {
      opts.credentials = 'include';
      if (!opts.headers) opts.headers = {};
      opts.headers['Accept'] = 'application/json';
      opts.headers['X-Requested-With'] = 'XMLHttpRequest';
      try {
        const res = await fetch(url, opts);
        const text = await res.text().catch(()=>null);
        let json = null;
        try { if (text) json = JSON.parse(text); } catch(e){ json = null; }
        return { ok: res.ok, status: res.status, json, text, headers: res.headers };
      } catch (e) {
        return { ok: false, status: 0, json: null, text: null, error: e };
      }
    }
   
    // Load translations (simplified)
    async function loadTranslations(lang) {
      try {
        const r = await fetch(`/vehicle_management/languages/${lang}_Vehicle_Maintenance.json`, { credentials: 'include' });
        if (r.ok) translations = await r.json();
      } catch (e) {
        console.error('Failed to load translations:', e);
      }
    }
   
    // Helper functions for names (same as main)
    function getDeptName(deptId) {
      if (!deptId || !deptMap[deptId]) return '-';
      return currentLang === 'ar' ? (deptMap[deptId].name_ar || deptMap[deptId].name || '-') : (deptMap[deptId].name_en || deptMap[deptId].name || '-');
    }
    function getSectionName(sectionId) {
      if (!sectionId || !sectionMap[sectionId]) return '-';
      return currentLang === 'ar' ? (sectionMap[sectionId].name_ar || sectionMap[sectionId].name || '-') : (sectionMap[sectionId].name_en || sectionMap[sectionId].name || '-');
    }
    function getDivisionName(divisionId) {
      if (!divisionId || !divisionMap[divisionId]) return '-';
      return currentLang === 'ar' ? (divisionMap[divisionId].name_ar || divisionMap[divisionId].name || '-') : (divisionMap[divisionId].name_en || divisionMap[divisionId].name || '-');
    }
   
    async function loadReferences() {
      try {
        const lang = currentLang || 'ar';
        const r = await fetchJson(API_REFERENCES + '?lang=' + lang, { method: 'GET' });
        if (r.ok && r.json && r.json.success) {
          const refs = r.json;
          deptMap = {};
          refs.departments.forEach(d => { deptMap[d.id] = d; });
          sectionMap = {};
          refs.sections.forEach(s => { sectionMap[s.id] = s; });
          divisionMap = {};
          refs.divisions.forEach(d => { divisionMap[d.id] = d; });
        }
      } catch (e) {
        console.error('Failed to load references:', e);
      }
    }
   
    async function loadVehicles() {
      try {
        const r = await fetchJson(API_VEHICLES + '?page=1&per_page=1000', { method: 'GET' });
        if (r.ok && r.json && r.json.success && r.json.vehicles) {
          vehiclesData = {};
          r.json.vehicles.forEach(v => {
            vehiclesData[v.vehicle_code] = v;
          });
        }
      } catch (e) {
        console.error('Failed to load vehicles:', e);
      }
    }
   
    async function loadReportData() {
      // Show loading
      maintenanceTableBody.innerHTML = '<tr><td colspan="16" style="text-align:center;">جاري التحميل...</td></tr>';
      totalCount.textContent = '0';
   
      // Load dependencies
      await loadTranslations(currentLang);
      await loadReferences();
      await loadVehicles();
   
      const params = new URLSearchParams();
      params.append('action', 'list');
      if (q) params.append('q', q);
      if (type) params.append('type', type);
      if (dept) params.append('department_id', dept);
      if (section) params.append('section_id', section);
      if (division) params.append('division_id', division);
      if (from) params.append('from_date', from);
      if (to) params.append('to_date', to);
      params.append('page', '1');
      params.append('per_page', '1000'); // All results for report
   
      const r = await fetchJson(API_MAINTENANCE + '?' + params.toString());
      if (!r.ok || !r.json || !r.json.success) {
        maintenanceTableBody.innerHTML = '<tr><td colspan="16">فشل تحميل التقرير</td></tr>';
        return;
      }
   
      const data = r.json;
      totalCount.textContent = String(data.total || 0);
   
      const tbody = maintenanceTableBody;
      tbody.innerHTML = '';
      if (data.records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="16">لا توجد نتائج</td></tr>';
        return;
      }
   
      // Enhanced render with full data
      data.records.forEach(m => {
        const tr = document.createElement('tr');
        const typeClass = `type-${(m.maintenance_type || 'Other').replace(/\s+/g, '')}`;
        let typeText = m.maintenance_type || 'Other';
        const typeKey = `type_${(m.maintenance_type || 'other').toLowerCase().replace(/\s+/g, '_').replace('check', 'technical').replace('repair', 'mechanical')}`;
        if (translations[typeKey]) typeText = translations[typeKey];
   
        const deptName = getDeptName(m.department_id);
        const sectName = getSectionName(m.section_id);
        const divName = getDivisionName(m.division_id);
   
        tr.innerHTML = `
          <td>${m.id}</td>
          <td>${m.vehicle_code || '-'}</td>
          <td>${m.driver_name || '-'}</td>
          <td>${m.driver_phone || '-'}</td>
          <td>${m.status || '-'}</td>
          <td>${m.manufacture_year || '-'}</td>
          <td>${m.emp_id || '-'}</td>
          <td>${m.type || '-'}</td>
          <td>${deptName}</td>
          <td>${sectName}</td>
          <td>${divName}</td>
          <td>${m.visit_date || '-'}</td>
          <td>${m.next_visit_date || '-'}</td>
          <td><span class="type-badge ${typeClass}">${typeText}</span></td>
          <td>${m.location || '-'}</td>
          <td>${m.notes || '-'}</td> <!-- Added notes -->
        `;
        tbody.appendChild(tr);
      });
   
      // Auto-print after short delay
      setTimeout(() => {
        window.print();
      }, 500);
    }
   
    printReportBtn.addEventListener('click', () => window.print());
    document.addEventListener('DOMContentLoaded', loadReportData);
  </script>
</body>
</html>
