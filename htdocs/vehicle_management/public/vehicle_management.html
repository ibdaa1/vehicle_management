<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="vehicles">إدارة المركبات</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
    /* === Page-Specific Styles === */
    .toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
    .toolbar .search-box{position:relative;flex:1;min-width:200px;max-width:360px}
    .toolbar .search-box input{width:100%;padding-inline-end:36px}
    .toolbar .search-box .search-icon{position:absolute;top:50%;inset-inline-end:12px;transform:translateY(-50%);color:var(--text-secondary);pointer-events:none}
    .toolbar .filters{display:flex;gap:10px;flex-wrap:wrap}
    .toolbar .filters select{min-width:140px}
    .toolbar-end{display:flex;align-items:center;gap:10px;margin-inline-start:auto}
    .stats-grid{margin-bottom:24px}
    #vehicleCards .cards-grid{animation:fadeIn .4s ease}
    .vehicle-card .vehicle-card-body .detail-row .value{font-weight:500;color:var(--text-primary)}
    #vehicleTable{display:none}
    .data-table .table-actions .btn-icon{width:30px;height:30px;font-size:.8rem}
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:24px}
    .pagination button{min-width:36px;height:36px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);border-radius:8px;cursor:pointer;font-size:.85rem;transition:all var(--transition)}
    .pagination button:hover:not(:disabled){background:var(--primary-main);color:var(--text-light)}
    .pagination button.active{background:var(--primary-main);color:var(--text-light);border-color:var(--primary-main)}
    .pagination button:disabled{opacity:.4;cursor:not-allowed}
    .modal-lg .modal-content{max-width:720px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}}
    .form-grid .full-width{grid-column:1/-1}
    .handover-list{list-style:none;padding:0}
    .handover-list li{padding:12px 0;border-bottom:1px dashed var(--border-default);font-size:.875rem}
    .handover-list li:last-child{border-bottom:none}
    .handover-list .ho-label{color:var(--text-secondary);margin-inline-end:6px}
    .empty-state{text-align:center;padding:48px 24px;color:var(--text-secondary)}
    .empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.5}
    @media(max-width:768px){
        .toolbar{flex-direction:column;align-items:stretch}
        .toolbar-end{margin-inline-start:0;justify-content:space-between}
        .toolbar .search-box{max-width:100%}
    }
    </style>
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header class="app-header">
        <div class="logo-area">
            <button class="btn btn-ghost btn-icon" data-action="toggle-sidebar-mobile" style="color:var(--text-light)">&#9776;</button>
            <img src="logo/logo.png" alt="Logo" id="headerLogo" onerror="this.style.display='none'">
            <h1 id="headerTitle" data-lang-key="system_name">نظام إدارة المركبات</h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost btn-icon" data-action="toggle-theme" title="Toggle theme" id="themeBtn">&#9728;&#65039;</button>
            <button class="btn btn-ghost btn-sm" data-action="toggle-lang" id="langBtn">EN</button>
            <div class="user-info"></div>
            <button class="btn btn-ghost btn-sm" data-action="logout" data-lang-key="logout">خروج</button>
        </div>
    </header>

    <!-- ========== SIDEBAR ========== -->
    <aside class="app-sidebar">
        <nav class="menu-list"></nav>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="app-main">
        <div class="page-header">
            <h2 data-lang-key="vehicles">إدارة المركبات</h2>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon blue">&#128663;</div>
                <div class="stat-info"><h4 data-lang-key="total">الإجمالي</h4><div class="stat-value" id="statTotal">&mdash;</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">&#9989;</div>
                <div class="stat-info"><h4 data-lang-key="operational">تعمل</h4><div class="stat-value" id="statOperational">&mdash;</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold">&#128295;</div>
                <div class="stat-info"><h4 data-lang-key="maintenance">صيانة</h4><div class="stat-value" id="statMaintenance">&mdash;</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">&#128683;</div>
                <div class="stat-info"><h4 data-lang-key="out_of_service">خارج الخدمة</h4><div class="stat-value" id="statOutOfService">&mdash;</div></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" class="form-control" id="searchInput" placeholder="بحث برقم المركبة أو اسم السائق..." data-lang-key="search_placeholder">
                <span class="search-icon">&#128269;</span>
            </div>
            <div class="filters">
                <select class="form-select" id="filterStatus">
                    <option value="">كل الحالات</option>
                    <option value="operational">تعمل</option>
                    <option value="maintenance">صيانة</option>
                    <option value="out_of_service">خارج الخدمة</option>
                </select>
                <select class="form-select" id="filterDepartment">
                    <option value="">كل الإدارات</option>
                </select>
                <select class="form-select" id="filterMode">
                    <option value="">كل الأنواع</option>
                    <option value="sedan">سيدان</option>
                    <option value="suv">دفع رباعي</option>
                    <option value="pickup">بيك أب</option>
                    <option value="van">فان</option>
                    <option value="bus">باص</option>
                    <option value="truck">شاحنة</option>
                </select>
            </div>
            <div class="toolbar-end">
                <div class="view-toggle">
                    <button class="active" id="btnCardView" onclick="toggleView('cards')" title="بطاقات">&#128451;&#65039;</button>
                    <button id="btnTableView" onclick="toggleView('table')" title="جدول">&#128203;</button>
                </div>
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">&#10133; <span data-lang-key="add_vehicle">إضافة مركبة</span></button>
            </div>
        </div>

        <!-- Vehicle Cards View -->
        <div id="vehicleCards">
            <div class="cards-grid" id="cardsContainer"></div>
        </div>

        <!-- Vehicle Table View -->
        <div id="vehicleTable">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th data-lang-key="vehicle_code">رمز المركبة</th>
                            <th data-lang-key="vehicle_type">النوع</th>
                            <th data-lang-key="plate_number">رقم اللوحة</th>
                            <th data-lang-key="driver">السائق</th>
                            <th data-lang-key="department">الإدارة</th>
                            <th data-lang-key="year">السنة</th>
                            <th data-lang-key="status">الحالة</th>
                            <th data-lang-key="actions">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="app-footer">
        <span data-lang-key="footer_text">نظام إدارة المركبات &copy; 2024</span>
    </footer>

    <!-- ========== ADD / EDIT VEHICLE MODAL ========== -->
    <div class="modal modal-lg" id="vehicleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="vehicleModalTitle" data-lang-key="add_vehicle">إضافة مركبة</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="vehId">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" data-lang-key="vehicle_code">رمز المركبة</label>
                        <input type="text" class="form-control" id="vehCode" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="plate_number">رقم اللوحة</label>
                        <input type="text" class="form-control" id="vehPlate">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="vehicle_type">النوع / الموديل</label>
                        <input type="text" class="form-control" id="vehType">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="vehicle_mode">فئة المركبة</label>
                        <select class="form-select" id="vehMode">
                            <option value="">اختر</option>
                            <option value="sedan">سيدان</option>
                            <option value="suv">دفع رباعي</option>
                            <option value="pickup">بيك أب</option>
                            <option value="van">فان</option>
                            <option value="bus">باص</option>
                            <option value="truck">شاحنة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="year">سنة الصنع</label>
                        <input type="number" class="form-control" id="vehYear" min="1990" max="2099">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="color">اللون</label>
                        <input type="text" class="form-control" id="vehColor">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="driver">اسم السائق</label>
                        <input type="text" class="form-control" id="vehDriver">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="status">الحالة</label>
                        <select class="form-select" id="vehStatus">
                            <option value="operational">تعمل</option>
                            <option value="maintenance">صيانة</option>
                            <option value="out_of_service">خارج الخدمة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="department">الإدارة</label>
                        <select class="form-select" id="vehDepartment" onchange="onDepartmentChange(this.value)">
                            <option value="">اختر الإدارة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="section">القسم</label>
                        <select class="form-select" id="vehSection" onchange="onSectionChange(this.value)">
                            <option value="">اختر القسم</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="division">الشعبة</label>
                        <select class="form-select" id="vehDivision">
                            <option value="">اختر الشعبة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-lang-key="chassis_number">رقم الهيكل</label>
                        <input type="text" class="form-control" id="vehChassis">
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label" data-lang-key="notes">ملاحظات</label>
                        <textarea class="form-control" id="vehNotes" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveVehicle()" data-lang-key="save">حفظ</button>
                <button class="btn btn-ghost" data-action="close-modal" data-lang-key="cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- ========== VEHICLE DETAILS MODAL ========== -->
    <div class="modal modal-lg" id="detailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-lang-key="vehicle_details">تفاصيل المركبة</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="detailsBody"></div>
        </div>
    </div>

    <!-- ========== HANDOVER MODAL ========== -->
    <div class="modal" id="handoverModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="handoverModalTitle" data-lang-key="handover">تسليم مركبة</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="hoVehicleId">
                <input type="hidden" id="hoType" value="handover">
                <div class="form-group">
                    <label class="form-label" data-lang-key="employee_id">رقم الموظف</label>
                    <input type="text" class="form-control" id="hoEmpId">
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="employee_name">اسم الموظف</label>
                    <input type="text" class="form-control" id="hoEmpName">
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="handover_date">تاريخ التسليم</label>
                    <input type="date" class="form-control" id="hoDate">
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="odometer_reading">قراءة العداد</label>
                    <input type="number" class="form-control" id="hoOdometer">
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="fuel_level">مستوى الوقود</label>
                    <select class="form-select" id="hoFuel">
                        <option value="full">ممتلئ</option>
                        <option value="three_quarter">3/4</option>
                        <option value="half">نصف</option>
                        <option value="quarter">ربع</option>
                        <option value="empty">فارغ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="vehicle_condition">حالة المركبة</label>
                    <select class="form-select" id="hoCondition">
                        <option value="excellent">ممتازة</option>
                        <option value="good">جيدة</option>
                        <option value="fair">مقبولة</option>
                        <option value="poor">سيئة</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" data-lang-key="notes">ملاحظات</label>
                    <textarea class="form-control" id="hoNotes" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveHandover()" data-lang-key="save">حفظ</button>
                <button class="btn btn-ghost" data-action="close-modal" data-lang-key="cancel">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- ========== DELETE CONFIRMATION MODAL ========== -->
    <div class="modal" id="deleteModal">
        <div class="modal-content" style="max-width:400px">
            <div class="modal-body text-center" style="padding:32px 24px">
                <div style="font-size:2.5rem;margin-bottom:16px">&#9888;&#65039;</div>
                <p style="margin-bottom:8px;font-weight:600" data-lang-key="confirm_delete">هل أنت متأكد من حذف هذه المركبة؟</p>
                <p class="text-muted" style="font-size:.85rem;margin-bottom:24px" data-lang-key="delete_warning">لا يمكن التراجع عن هذا الإجراء</p>
                <input type="hidden" id="deleteVehicleId">
                <div class="d-flex align-center gap-1" style="justify-content:center">
                    <button class="btn btn-danger" onclick="confirmDelete()" data-lang-key="delete">حذف</button>
                    <button class="btn btn-ghost" data-action="close-modal" data-lang-key="cancel">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
    /* ============================================
       Vehicle Management Page Controller
       ============================================ */
    const VM = {
        vehicles: [],
        references: { departments: [], sections: [], divisions: [] },
        currentView: 'cards',
        currentPage: 1,
        perPage: 12,
        totalPages: 1,
        filters: {}
    };

    /* ---------- Initialization ---------- */
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(async function() {
            try {
                await Promise.all([loadReferences(), loadStats()]);
                loadVehicles();
                bindFilterEvents();
                updateThemeIcon();
            } catch (e) {
                console.error('Init error:', e);
            }
        }, 200);
    });

    function updateThemeIcon() {
        var btn = document.getElementById('themeBtn');
        if (btn) btn.textContent = ThemeManager.getMode() === 'dark' ? '\uD83C\uDF19' : '\u2600\uFE0F';
    }

    /* Observe theme changes */
    new MutationObserver(function() { updateThemeIcon(); })
        .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    /* ---------- Load References ---------- */
    async function loadReferences() {
        try {
            var res = await API.get('/references');
            var data = res.data || res;
            VM.references.departments = data.departments || [];
            VM.references.sections = data.sections || [];
            VM.references.divisions = data.divisions || [];
            populateDepartments();
        } catch (e) { /* References might not be available */ }
    }

    function populateDepartments() {
        var selectors = [document.getElementById('filterDepartment'), document.getElementById('vehDepartment')];
        selectors.forEach(function(sel) {
            if (!sel) return;
            var first = sel.options[0];
            sel.innerHTML = '';
            sel.appendChild(first);
            VM.references.departments.forEach(function(d) {
                var opt = document.createElement('option');
                opt.value = d.id;
                opt.textContent = d.name || d.name_ar || d.name_en;
                sel.appendChild(opt);
            });
        });
    }

    function onDepartmentChange(deptId) {
        var secSel = document.getElementById('vehSection');
        var divSel = document.getElementById('vehDivision');
        secSel.innerHTML = '<option value="">' + (i18n.t('choose_section') || '\u0627\u062E\u062A\u0631 \u0627\u0644\u0642\u0633\u0645') + '</option>';
        divSel.innerHTML = '<option value="">' + (i18n.t('choose_division') || '\u0627\u062E\u062A\u0631 \u0627\u0644\u0634\u0639\u0628\u0629') + '</option>';
        if (!deptId) return;
        VM.references.sections.filter(function(s) { return String(s.department_id) === String(deptId); }).forEach(function(s) {
            var opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name || s.name_ar || s.name_en;
            secSel.appendChild(opt);
        });
    }

    function onSectionChange(secId) {
        var divSel = document.getElementById('vehDivision');
        divSel.innerHTML = '<option value="">' + (i18n.t('choose_division') || '\u0627\u062E\u062A\u0631 \u0627\u0644\u0634\u0639\u0628\u0629') + '</option>';
        if (!secId) return;
        VM.references.divisions.filter(function(d) { return String(d.section_id) === String(secId); }).forEach(function(d) {
            var opt = document.createElement('option');
            opt.value = d.id;
            opt.textContent = d.name || d.name_ar || d.name_en;
            divSel.appendChild(opt);
        });
    }

    /* ---------- Load Stats ---------- */
    async function loadStats() {
        try {
            var res = await API.get('/vehicles/stats');
            var d = res.data || res;
            document.getElementById('statTotal').textContent = UI.formatNumber(d.total || 0);
            document.getElementById('statOperational').textContent = UI.formatNumber(d.operational || 0);
            document.getElementById('statMaintenance').textContent = UI.formatNumber(d.maintenance || 0);
            document.getElementById('statOutOfService').textContent = UI.formatNumber(d.out_of_service || 0);
        } catch (e) { /* Stats unavailable */ }
    }

    /* ---------- Load Vehicles ---------- */
    async function loadVehicles() {
        var main = document.querySelector('.app-main');
        UI.showSpinner(main);
        try {
            var query = '?page=' + VM.currentPage + '&per_page=' + VM.perPage;
            var f = VM.filters;
            if (f.status) query += '&status=' + encodeURIComponent(f.status);
            if (f.department_id) query += '&department_id=' + encodeURIComponent(f.department_id);
            if (f.vehicle_mode) query += '&vehicle_mode=' + encodeURIComponent(f.vehicle_mode);
            if (f.search) query += '&search=' + encodeURIComponent(f.search);

            var res = await API.get('/vehicles' + query);
            var payload = res.data || res;
            VM.vehicles = Array.isArray(payload) ? payload : (payload.data || payload.items || []);
            VM.totalPages = payload.last_page || payload.total_pages || Math.ceil((payload.total || VM.vehicles.length) / VM.perPage) || 1;

            renderCurrentView();
            renderPagination();
        } catch (e) {
            UI.showToast(i18n.t('error_loading') || '\u062E\u0637\u0623 \u0641\u064A \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0628\u064A\u0627\u0646\u0627\u062A', 'error');
        } finally {
            UI.hideSpinner(main);
        }
    }

    /* ---------- Render Helpers ---------- */
    function renderCurrentView() {
        if (VM.currentView === 'cards') renderCards(VM.vehicles);
        else renderTable(VM.vehicles);
    }

    function statusBadge(status) {
        var map = {
            operational: { cls: 'badge-success', label: i18n.t('operational') || '\u062A\u0639\u0645\u0644' },
            maintenance: { cls: 'badge-warning', label: i18n.t('maintenance') || '\u0635\u064A\u0627\u0646\u0629' },
            out_of_service: { cls: 'badge-danger', label: i18n.t('out_of_service') || '\u062E\u0627\u0631\u062C \u0627\u0644\u062E\u062F\u0645\u0629' }
        };
        var s = map[status] || { cls: 'badge-info', label: status || '\u2014' };
        return '<span class="badge ' + s.cls + '">' + UI._escapeHtml(s.label) + '</span>';
    }

    function deptName(id) {
        var d = VM.references.departments.find(function(dep) { return String(dep.id) === String(id); });
        return d ? (d.name || d.name_ar || d.name_en) : '\u2014';
    }

    /* ---------- Card View ---------- */
    function renderCards(vehicles) {
        var container = document.getElementById('cardsContainer');
        if (!vehicles.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">\uD83D\uDE97</div><p>' + (i18n.t('no_vehicles') || '\u0644\u0627 \u062A\u0648\u062C\u062F \u0645\u0631\u0643\u0628\u0627\u062A') + '</p></div>';
            return;
        }
        container.innerHTML = vehicles.map(function(v) {
            return '<div class="vehicle-card fade-in">' +
                '<div class="vehicle-card-header">' +
                    '<h4>' + UI._escapeHtml(v.vehicle_code || v.code || '\u2014') + '</h4>' +
                    statusBadge(v.status) +
                '</div>' +
                '<div class="vehicle-card-body">' +
                    '<div class="detail-row"><span class="label">' + (i18n.t('vehicle_type') || '\u0627\u0644\u0646\u0648\u0639') + '</span><span class="value">' + UI._escapeHtml(v.type || v.vehicle_type || '\u2014') + '</span></div>' +
                    '<div class="detail-row"><span class="label">' + (i18n.t('driver') || '\u0627\u0644\u0633\u0627\u0626\u0642') + '</span><span class="value">' + UI._escapeHtml(v.driver_name || v.driver || '\u2014') + '</span></div>' +
                    '<div class="detail-row"><span class="label">' + (i18n.t('department') || '\u0627\u0644\u0625\u062F\u0627\u0631\u0629') + '</span><span class="value">' + UI._escapeHtml(deptName(v.department_id)) + '</span></div>' +
                    '<div class="detail-row"><span class="label">' + (i18n.t('year') || '\u0627\u0644\u0633\u0646\u0629') + '</span><span class="value">' + (v.year || '\u2014') + '</span></div>' +
                    '<div class="detail-row"><span class="label">' + (i18n.t('plate_number') || '\u0627\u0644\u0644\u0648\u062D\u0629') + '</span><span class="value">' + UI._escapeHtml(v.plate_number || '\u2014') + '</span></div>' +
                '</div>' +
                '<div class="vehicle-card-footer">' +
                    '<button class="btn btn-ghost btn-icon btn-sm" onclick="openDetailsModal(' + v.id + ')" title="' + (i18n.t('view') || '\u0639\u0631\u0636') + '">\uD83D\uDC41\uFE0F</button>' +
                    '<button class="btn btn-ghost btn-icon btn-sm" onclick="openEditModal(' + v.id + ')" title="' + (i18n.t('edit') || '\u062A\u0639\u062F\u064A\u0644') + '">\u270F\uFE0F</button>' +
                    '<button class="btn btn-ghost btn-icon btn-sm" onclick="openHandoverModal(' + v.id + ',\'handover\')" title="' + (i18n.t('handover') || '\u062A\u0633\u0644\u064A\u0645') + '">\uD83D\uDD11</button>' +
                    '<button class="btn btn-ghost btn-icon btn-sm" onclick="openHandoverModal(' + v.id + ',\'receive\')" title="' + (i18n.t('receive') || '\u0627\u0633\u062A\u0644\u0627\u0645') + '">\uD83D\uDCE5</button>' +
                    '<button class="btn btn-ghost btn-icon btn-sm" onclick="deleteVehicle(' + v.id + ')" title="' + (i18n.t('delete') || '\u062D\u0630\u0641') + '" style="color:var(--status-danger)">\uD83D\uDDD1\uFE0F</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    /* ---------- Table View ---------- */
    function renderTable(vehicles) {
        var tbody = document.getElementById('tableBody');
        if (!vehicles.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center" style="padding:32px">' + (i18n.t('no_vehicles') || '\u0644\u0627 \u062A\u0648\u062C\u062F \u0645\u0631\u0643\u0628\u0627\u062A') + '</td></tr>';
            return;
        }
        tbody.innerHTML = vehicles.map(function(v) {
            return '<tr>' +
                '<td data-label="' + (i18n.t('vehicle_code') || '\u0631\u0645\u0632 \u0627\u0644\u0645\u0631\u0643\u0628\u0629') + '">' + UI._escapeHtml(v.vehicle_code || v.code || '\u2014') + '</td>' +
                '<td data-label="' + (i18n.t('vehicle_type') || '\u0627\u0644\u0646\u0648\u0639') + '">' + UI._escapeHtml(v.type || v.vehicle_type || '\u2014') + '</td>' +
                '<td data-label="' + (i18n.t('plate_number') || '\u0627\u0644\u0644\u0648\u062D\u0629') + '">' + UI._escapeHtml(v.plate_number || '\u2014') + '</td>' +
                '<td data-label="' + (i18n.t('driver') || '\u0627\u0644\u0633\u0627\u0626\u0642') + '">' + UI._escapeHtml(v.driver_name || v.driver || '\u2014') + '</td>' +
                '<td data-label="' + (i18n.t('department') || '\u0627\u0644\u0625\u062F\u0627\u0631\u0629') + '">' + UI._escapeHtml(deptName(v.department_id)) + '</td>' +
                '<td data-label="' + (i18n.t('year') || '\u0627\u0644\u0633\u0646\u0629') + '">' + (v.year || '\u2014') + '</td>' +
                '<td data-label="' + (i18n.t('status') || '\u0627\u0644\u062D\u0627\u0644\u0629') + '">' + statusBadge(v.status) + '</td>' +
                '<td data-label="' + (i18n.t('actions') || '\u0625\u062C\u0631\u0627\u0621\u0627\u062A') + '">' +
                    '<div class="table-actions">' +
                        '<button class="btn btn-ghost btn-icon btn-sm" onclick="openDetailsModal(' + v.id + ')" title="' + (i18n.t('view') || '\u0639\u0631\u0636') + '">\uD83D\uDC41\uFE0F</button>' +
                        '<button class="btn btn-ghost btn-icon btn-sm" onclick="openEditModal(' + v.id + ')" title="' + (i18n.t('edit') || '\u062A\u0639\u062F\u064A\u0644') + '">\u270F\uFE0F</button>' +
                        '<button class="btn btn-ghost btn-icon btn-sm" onclick="openHandoverModal(' + v.id + ',\'handover\')" title="' + (i18n.t('handover') || '\u062A\u0633\u0644\u064A\u0645') + '">\uD83D\uDD11</button>' +
                        '<button class="btn btn-ghost btn-icon btn-sm" onclick="deleteVehicle(' + v.id + ')" title="' + (i18n.t('delete') || '\u062D\u0630\u0641') + '" style="color:var(--status-danger)">\uD83D\uDDD1\uFE0F</button>' +
                    '</div>' +
                '</td>' +
            '</tr>';
        }).join('');
    }

    /* ---------- Toggle View ---------- */
    function toggleView(mode) {
        VM.currentView = mode;
        var cardsEl = document.getElementById('vehicleCards');
        var tableEl = document.getElementById('vehicleTable');
        var btnCard = document.getElementById('btnCardView');
        var btnTable = document.getElementById('btnTableView');
        if (mode === 'cards') {
            cardsEl.style.display = '';
            tableEl.style.display = 'none';
            btnCard.classList.add('active');
            btnTable.classList.remove('active');
        } else {
            cardsEl.style.display = 'none';
            tableEl.style.display = '';
            btnTable.classList.add('active');
            btnCard.classList.remove('active');
        }
        renderCurrentView();
    }

    /* ---------- Pagination ---------- */
    function renderPagination() {
        var el = document.getElementById('pagination');
        if (VM.totalPages <= 1) { el.innerHTML = ''; return; }
        var html = '<button ' + (VM.currentPage <= 1 ? 'disabled' : '') + ' onclick="goToPage(' + (VM.currentPage - 1) + ')">\u2039</button>';
        var start = Math.max(1, VM.currentPage - 2);
        var end = Math.min(VM.totalPages, VM.currentPage + 2);
        for (var i = start; i <= end; i++) {
            html += '<button class="' + (i === VM.currentPage ? 'active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
        }
        html += '<button ' + (VM.currentPage >= VM.totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (VM.currentPage + 1) + ')">\u203A</button>';
        el.innerHTML = html;
    }

    function goToPage(page) {
        if (page < 1 || page > VM.totalPages) return;
        VM.currentPage = page;
        loadVehicles();
    }

    /* ---------- Filters & Search ---------- */
    function bindFilterEvents() {
        var searchTimer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() {
                VM.filters.search = e.target.value.trim();
                VM.currentPage = 1;
                loadVehicles();
            }, 400);
        });
        document.getElementById('filterStatus').addEventListener('change', function(e) {
            VM.filters.status = e.target.value; VM.currentPage = 1; loadVehicles();
        });
        document.getElementById('filterDepartment').addEventListener('change', function(e) {
            VM.filters.department_id = e.target.value; VM.currentPage = 1; loadVehicles();
        });
        document.getElementById('filterMode').addEventListener('change', function(e) {
            VM.filters.vehicle_mode = e.target.value; VM.currentPage = 1; loadVehicles();
        });
    }

    /* ---------- Add Vehicle ---------- */
    function openAddModal() {
        document.getElementById('vehicleModalTitle').textContent = i18n.t('add_vehicle') || '\u0625\u0636\u0627\u0641\u0629 \u0645\u0631\u0643\u0628\u0629';
        resetVehicleForm();
        UI.showModal('vehicleModal');
    }

    /* ---------- Edit Vehicle ---------- */
    async function openEditModal(id) {
        try {
            var res = await API.get('/vehicles/' + id);
            var v = res.data || res;
            document.getElementById('vehicleModalTitle').textContent = i18n.t('edit_vehicle') || '\u062A\u0639\u062F\u064A\u0644 \u0645\u0631\u0643\u0628\u0629';
            document.getElementById('vehId').value = v.id;
            document.getElementById('vehCode').value = v.vehicle_code || v.code || '';
            document.getElementById('vehPlate').value = v.plate_number || '';
            document.getElementById('vehType').value = v.type || v.vehicle_type || '';
            document.getElementById('vehMode').value = v.vehicle_mode || '';
            document.getElementById('vehYear').value = v.year || '';
            document.getElementById('vehColor').value = v.color || '';
            document.getElementById('vehDriver').value = v.driver_name || v.driver || '';
            document.getElementById('vehStatus').value = v.status || 'operational';
            document.getElementById('vehChassis').value = v.chassis_number || '';
            document.getElementById('vehNotes').value = v.notes || '';
            document.getElementById('vehDepartment').value = v.department_id || '';
            onDepartmentChange(v.department_id || '');
            setTimeout(function() {
                document.getElementById('vehSection').value = v.section_id || '';
                onSectionChange(v.section_id || '');
                setTimeout(function() { document.getElementById('vehDivision').value = v.division_id || ''; }, 50);
            }, 50);
            UI.showModal('vehicleModal');
        } catch (e) {
            UI.showToast(i18n.t('error_loading') || '\u062E\u0637\u0623 \u0641\u064A \u062A\u062D\u0645\u064A\u0644 \u0627\u0644\u0628\u064A\u0627\u0646\u0627\u062A', 'error');
        }
    }

    /* ---------- Save Vehicle ---------- */
    async function saveVehicle() {
        var id = document.getElementById('vehId').value;
        var payload = {
            vehicle_code: document.getElementById('vehCode').value.trim(),
            plate_number: document.getElementById('vehPlate').value.trim(),
            type: document.getElementById('vehType').value.trim(),
            vehicle_mode: document.getElementById('vehMode').value,
            year: document.getElementById('vehYear').value || null,
            color: document.getElementById('vehColor').value.trim(),
            driver_name: document.getElementById('vehDriver').value.trim(),
            status: document.getElementById('vehStatus').value,
            department_id: document.getElementById('vehDepartment').value || null,
            section_id: document.getElementById('vehSection').value || null,
            division_id: document.getElementById('vehDivision').value || null,
            chassis_number: document.getElementById('vehChassis').value.trim(),
            notes: document.getElementById('vehNotes').value.trim()
        };

        if (!payload.vehicle_code) {
            UI.showToast(i18n.t('vehicle_code_required') || '\u0631\u0645\u0632 \u0627\u0644\u0645\u0631\u0643\u0628\u0629 \u0645\u0637\u0644\u0648\u0628', 'warning');
            return;
        }

        try {
            if (id) {
                await API.put('/vehicles/' + id, payload);
                UI.showToast(i18n.t('vehicle_updated') || '\u062A\u0645 \u062A\u062D\u062F\u064A\u062B \u0627\u0644\u0645\u0631\u0643\u0628\u0629', 'success');
            } else {
                await API.post('/vehicles', payload);
                UI.showToast(i18n.t('vehicle_created') || '\u062A\u0645 \u0625\u0636\u0627\u0641\u0629 \u0627\u0644\u0645\u0631\u0643\u0628\u0629', 'success');
            }
            UI.hideModal('vehicleModal');
            loadVehicles();
            loadStats();
        } catch (e) {
            UI.showToast(e.message || i18n.t('error_saving') || '\u062E\u0637\u0623 \u0641\u064A \u0627\u0644\u062D\u0641\u0638', 'error');
        }
    }

    function resetVehicleForm() {
        ['vehId','vehCode','vehPlate','vehType','vehYear','vehColor','vehDriver','vehChassis','vehNotes'].forEach(function(id) {
            document.getElementById(id).value = '';
        });
        document.getElementById('vehMode').value = '';
        document.getElementById('vehStatus').value = 'operational';
        document.getElementById('vehDepartment').value = '';
        document.getElementById('vehSection').innerHTML = '<option value="">\u0627\u062E\u062A\u0631 \u0627\u0644\u0642\u0633\u0645</option>';
        document.getElementById('vehDivision').innerHTML = '<option value="">\u0627\u062E\u062A\u0631 \u0627\u0644\u0634\u0639\u0628\u0629</option>';
    }

    /* ---------- Delete Vehicle ---------- */
    function deleteVehicle(id) {
        document.getElementById('deleteVehicleId').value = id;
        UI.showModal('deleteModal');
    }

    async function confirmDelete() {
        var id = document.getElementById('deleteVehicleId').value;
        if (!id) return;
        try {
            await API.del('/vehicles/' + id);
            UI.showToast(i18n.t('vehicle_deleted') || '\u062A\u0645 \u062D\u0630\u0641 \u0627\u0644\u0645\u0631\u0643\u0628\u0629', 'success');
            UI.hideModal('deleteModal');
            loadVehicles();
            loadStats();
        } catch (e) {
            UI.showToast(e.message || i18n.t('error_deleting') || '\u062E\u0637\u0623 \u0641\u064A \u0627\u0644\u062D\u0630\u0641', 'error');
        }
    }

    /* ---------- Vehicle Details ---------- */
    async function openDetailsModal(id) {
        var body = document.getElementById('detailsBody');
        body.innerHTML = '<div class="text-center"><div class="spinner"></div></div>';
        UI.showModal('detailsModal');
        try {
            var res = await API.get('/vehicles/' + id);
            var v = res.data || res;
            var html = '<div class="form-grid" style="gap:8px 16px">';
            var fields = [
                ['vehicle_code', v.vehicle_code || v.code],
                ['plate_number', v.plate_number],
                ['vehicle_type', v.type || v.vehicle_type],
                ['vehicle_mode', v.vehicle_mode],
                ['year', v.year],
                ['color', v.color],
                ['driver', v.driver_name || v.driver],
                ['status', null, statusBadge(v.status)],
                ['department', deptName(v.department_id)],
                ['chassis_number', v.chassis_number]
            ];
            fields.forEach(function(f) {
                html += '<div class="detail-row" style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border-default)">';
                html += '<span class="text-muted">' + (i18n.t(f[0]) || f[0]) + '</span>';
                html += '<span>' + (f[2] || UI._escapeHtml(String(f[1] || '\u2014'))) + '</span>';
                html += '</div>';
            });
            if (v.notes) {
                html += '<div class="full-width" style="padding:8px 0"><span class="text-muted">' + (i18n.t('notes') || '\u0645\u0644\u0627\u062D\u0638\u0627\u062A') + ':</span><p style="margin-top:4px">' + UI._escapeHtml(v.notes) + '</p></div>';
            }
            html += '</div>';
            html += '<h4 style="margin-top:24px;margin-bottom:12px">' + (i18n.t('handover_history') || '\u0633\u062C\u0644 \u0627\u0644\u062A\u0633\u0644\u064A\u0645') + '</h4>';
            html += '<div id="handoverHistoryContainer"><div class="text-center"><div class="spinner spinner-sm"></div></div></div>';
            body.innerHTML = html;
            loadHandovers(id);
        } catch (e) {
            body.innerHTML = '<p class="text-danger">' + (i18n.t('error_loading') || '\u062E\u0637\u0623 \u0641\u064A \u0627\u0644\u062A\u062D\u0645\u064A\u0644') + '</p>';
        }
    }

    /* ---------- Handover Modal ---------- */
    function openHandoverModal(vehicleId, type) {
        document.getElementById('hoVehicleId').value = vehicleId;
        document.getElementById('hoType').value = type;
        document.getElementById('handoverModalTitle').textContent = type === 'receive'
            ? (i18n.t('receive') || '\u0627\u0633\u062A\u0644\u0627\u0645 \u0645\u0631\u0643\u0628\u0629')
            : (i18n.t('handover') || '\u062A\u0633\u0644\u064A\u0645 \u0645\u0631\u0643\u0628\u0629');
        ['hoEmpId','hoEmpName','hoOdometer','hoNotes'].forEach(function(id) { document.getElementById(id).value = ''; });
        document.getElementById('hoDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('hoFuel').value = 'full';
        document.getElementById('hoCondition').value = 'good';
        UI.showModal('handoverModal');
    }

    /* ---------- Save Handover ---------- */
    async function saveHandover() {
        var vehicleId = document.getElementById('hoVehicleId').value;
        var type = document.getElementById('hoType').value;
        var payload = {
            to_emp_id: document.getElementById('hoEmpId').value.trim(),
            to_emp_name: document.getElementById('hoEmpName').value.trim(),
            handover_date: document.getElementById('hoDate').value,
            odometer_reading: document.getElementById('hoOdometer').value || null,
            fuel_level: document.getElementById('hoFuel').value,
            vehicle_condition: document.getElementById('hoCondition').value,
            notes: document.getElementById('hoNotes').value.trim()
        };

        if (!payload.to_emp_name) {
            UI.showToast(i18n.t('employee_name_required') || '\u0627\u0633\u0645 \u0627\u0644\u0645\u0648\u0638\u0641 \u0645\u0637\u0644\u0648\u0628', 'warning');
            return;
        }

        var endpoint = type === 'receive'
            ? '/vehicles/' + vehicleId + '/receive'
            : '/vehicles/' + vehicleId + '/handover';
        try {
            await API.post(endpoint, payload);
            UI.showToast(i18n.t('handover_saved') || '\u062A\u0645 \u0627\u0644\u062D\u0641\u0638 \u0628\u0646\u062C\u0627\u062D', 'success');
            UI.hideModal('handoverModal');
        } catch (e) {
            UI.showToast(e.message || i18n.t('error_saving') || '\u062E\u0637\u0623 \u0641\u064A \u0627\u0644\u062D\u0641\u0638', 'error');
        }
    }

    /* ---------- Load Handover History ---------- */
    async function loadHandovers(vehicleId) {
        var container = document.getElementById('handoverHistoryContainer');
        if (!container) return;
        try {
            var res = await API.get('/vehicles/' + vehicleId + '/handovers');
            var list = (res.data || res) || [];
            var items = Array.isArray(list) ? list : (list.data || []);
            if (!items.length) {
                container.innerHTML = '<p class="text-muted" style="font-size:.875rem">' + (i18n.t('no_handovers') || '\u0644\u0627 \u064A\u0648\u062C\u062F \u0633\u062C\u0644 \u062A\u0633\u0644\u064A\u0645') + '</p>';
                return;
            }
            container.innerHTML = '<ul class="handover-list">' + items.map(function(h) {
                var line = '<li>';
                line += '<div class="d-flex align-center gap-1" style="justify-content:space-between;flex-wrap:wrap">';
                line += '<strong>' + UI._escapeHtml(h.to_emp_name || '\u2014') + '</strong>';
                line += '<span class="badge ' + (h.type === 'receive' ? 'badge-info' : 'badge-success') + '">' + (h.type === 'receive' ? (i18n.t('receive') || '\u0627\u0633\u062A\u0644\u0627\u0645') : (i18n.t('handover') || '\u062A\u0633\u0644\u064A\u0645')) + '</span>';
                line += '</div>';
                line += '<div style="margin-top:4px;font-size:.8rem;color:var(--text-secondary)">';
                line += '<span class="ho-label">' + (i18n.t('date') || '\u0627\u0644\u062A\u0627\u0631\u064A\u062E') + ':</span>' + UI.formatDate(h.handover_date);
                if (h.odometer_reading) line += ' \u00B7 <span class="ho-label">' + (i18n.t('odometer') || '\u0627\u0644\u0639\u062F\u0627\u062F') + ':</span>' + UI.formatNumber(h.odometer_reading);
                if (h.fuel_level) line += ' \u00B7 <span class="ho-label">' + (i18n.t('fuel') || '\u0627\u0644\u0648\u0642\u0648\u062F') + ':</span>' + UI._escapeHtml(h.fuel_level);
                line += '</div>';
                if (h.notes) line += '<div style="margin-top:2px;font-size:.8rem;font-style:italic;color:var(--text-secondary)">' + UI._escapeHtml(h.notes) + '</div>';
                line += '</li>';
                return line;
            }).join('') + '</ul>';
        } catch (e) {
            container.innerHTML = '<p class="text-muted" style="font-size:.875rem">' + (i18n.t('no_handovers') || '\u0644\u0627 \u064A\u0648\u062C\u062F \u0633\u062C\u0644 \u062A\u0633\u0644\u064A\u0645') + '</p>';
        }
    }
    </script>
</body>
</html>
