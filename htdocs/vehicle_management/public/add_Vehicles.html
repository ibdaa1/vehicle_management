<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="pageTitle">إدارة المركبات</title>
  <link rel="stylesheet" href="/vehicle_management/assets/css/add_Vehicles.css">
  <style>
    :root{
      --bg: #fbfdfb;
      --card: #fff;
      --primary: #254b2a;
      --accent: #3f6e3f;
      --muted: #bda36b;
      --text: #0f2a18;
      --border: #e9efe9;
      --radius: 12px;
      --danger: #dc2626;
    }
    html,body{height:100%;margin:0;font-family:"Tajawal",system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{max-width:1200px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}
    .card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:0 6px 22px rgba(15,40,20,0.04);flex:1;display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
    h1{margin:0;font-size:1.25rem;color:var(--primary)}
    .subtitle{color:var(--muted);font-size:0.95rem}
    .meta{color:var(--muted);font-weight:600}
    .userInfo{font-size:0.95rem;color:var(--text);font-weight:600}
    form .form-row{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
    .col{flex:1;min-width:160px}
    label{display:block;margin-bottom:8px;font-weight:700;color:var(--text)}
    input,select,textarea{height:44px;padding:10px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:15px;width:100%;box-sizing:border-box;color:var(--text)}
    textarea{height:110px;padding:10px;min-height:96px}
    .actions{display:flex;gap:10px;margin-top:16px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:4px;padding:10px 14px;border-radius:8px;border:0;background:var(--primary);color:#fff;cursor:pointer;font-weight:700;font-size:14px;transition:background 0.2s}
    .btn:hover{background:#1e3a21}
    .btn.ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.danger:hover{background:#b91c1c}
    .btn.icon-only{gap:0;padding:8px;border-radius:50%;width:40px;height:40px;justify-content:center}
    .select-row .form-control{width:48%}
    .search-section{margin-bottom:16px}
    .search-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .search-input{flex:1;min-width:200px}
    .filter-select{min-width:150px}
    .results-section{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .results-header{margin-bottom:12px}
    .table-container{flex:1;overflow:auto}
    .vehicles-table{width:100%;border-collapse:collapse;margin-bottom:16px}
    .vehicles-table th,.vehicles-table td{padding:12px 8px;text-align:right;border-bottom:1px solid var(--border)}
    .vehicles-table th{font-weight:700;color:var(--primary);background:var(--bg)}
    .status-badge{display:inline-block;padding:4px 8px;border-radius:20px;font-size:12px;font-weight:600}
    .status-operational{background:#d1fae5;color:#065f46}
    .status-maintenance{background:#fef3c7;color:#92400e}
    .status-out_of_service{background:#fee2e2;color:#991b1b}
    .action-buttons{display:flex;gap:4px}
    .action-buttons .btn.small{padding:6px 10px;font-size:12px}
    .pagination{display:flex;gap:4px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:16px}
    .page-btn{padding:8px 12px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;border-radius:6px;transition:background 0.2s}
    .page-btn:hover,.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .page-info{margin:0 12px;color:var(--muted)}
    .form-section{flex:1}
    [dir="rtl"] .vehicles-table th,.vehicles-table td{text-align:right}
    [dir="ltr"] .vehicles-table th,.vehicles-table td{text-align:left}
    [dir="rtl"] .search-row,[dir="rtl"] .form-row,[dir="rtl"] .header,[dir="rtl"] .actions{justify-content:flex-end}
    [dir="ltr"] .search-row,[dir="ltr"] .form-row,[dir="ltr"] .header,[dir="ltr"] .actions{justify-content:flex-start}
    [data-i18n]{transition:opacity 0.3s}
    @media(max-width:768px){
      .container{padding:8px}
      .search-row{flex-direction:column;align-items:stretch}
      .search-input,.filter-select{width:100%}
      .form-row{flex-direction:column}
      .select-row .form-control{width:100%}
      .vehicles-table{font-size:14px}
      .vehicles-table th,.vehicles-table td{padding:8px 4px}
      .action-buttons{flex-direction:column;gap:2px}
      .btn.icon-only{width:36px;height:36px;padding:6px}
      .header{flex-direction:column;align-items:stretch;text-align:center}
    }
    @media(max-width:480px){
      .vehicles-table th{display:none}
      .vehicles-table td{display:block;padding:8px;text-align:right;border-bottom:2px solid var(--border);position:relative}
      .vehicles-table td:before{content:attr(data-label);font-weight:700;display:block;color:var(--primary);margin-bottom:4px}
      [dir="ltr"] .vehicles-table td{text-align:left}
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card" id="vehicleCard" aria-labelledby="pageTitle">
      <div class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">HCS</div>
          <div>
            <h1 id="pageTitle" data-i18n="pageTitle">إدارة المركبات</h1>
            <div class="subtitle" id="pageSubtitle" data-i18n="pageSubtitle">بحث، إضافة، تعديل، وحذف المركبات</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="meta" id="orgName" data-i18n="orgName">HCS Department</div>
          <div class="userInfo" id="loggedUser">---</div>
        </div>
      </div>
  
      <!-- Search and Filter Section -->
      <div class="search-section">
        <div class="search-row">
          <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="🔍 بحث: رقم المركبة، الرمز الوظيفي، اسم السائق، هاتف السائق..." />
          <select id="sectorFilter" class="filter-select">
            <option value="" data-i18n="sectorFilterPlaceholder">كل القطاعات</option>
          </select>
          <select id="deptFilter" class="filter-select">
            <option value="" data-i18n="deptFilterPlaceholder">كل الإدارات</option>
          </select>
          <select id="sectionFilter" class="filter-select">
            <option value="" data-i18n="sectionFilterPlaceholder">كل الأقسام</option>
          </select>
          <select id="statusFilter" class="filter-select">
            <option value="" data-i18n="statusFilterPlaceholder">كل الحالات</option>
            <option value="operational" data-i18n="statusOperational">✅ قيد التشغيل</option>
            <option value="maintenance" data-i18n="statusMaintenance">🔧 صيانة</option>
            <option value="out_of_service" data-i18n="statusOutOfService">❌ خارج الخدمة</option>
          </select>
          <button id="searchBtn" class="btn icon-only" type="button" data-i18n-title="searchBtnTitle" title="بحث">🔍</button>
          <button id="reportBtn" class="btn icon-only" type="button" data-i18n-title="reportBtnTitle" title="تقرير">📊</button>
          <button id="addNewBtn" class="btn icon-only" type="button" data-i18n-title="addNewBtnTitle" title="إضافة مركبة">➕</button>
        </div>
      </div>
      <!-- Results Table Section -->
      <div id="resultsSection" class="results-section" style="display:none;">
        <div class="results-header">
          <h2 data-i18n="resultsHeader">نتائج البحث (<span id="totalCount">0</span>)</h2>
        </div>
        <div class="table-container">
          <table id="vehiclesTable" class="vehicles-table">
            <thead>
              <tr>
                <th data-i18n="thId">ID</th>
                <th data-i18n="thVehicleCode" data-label="رقم المركبة">رقم المركبة</th>
                <th data-i18n="thDriver" data-label="السائق">السائق</th>
                <th data-i18n="thDriverPhone" data-label="هاتف السائق">هاتف السائق</th>
                <th data-i18n="thEmpId" data-label="الرمز الوظيفي">الرمز الوظيفي</th>
                <th data-i18n="thSector" data-label="القطاع">القطاع</th>
                <th data-i18n="thDepartment" data-label="الإدارة">الإدارة</th>
                <th data-i18n="thSection" data-label="القسم">القسم</th>
                <th data-i18n="thDivision" data-label="الشعبة">الشعبة</th>
                <th data-i18n="thStatus" data-label="الحالة">الحالة</th>
                <th data-i18n="thActions" data-label="الإجراءات">الإجراءات</th>
              </tr>
            </thead>
            <tbody id="vehiclesTableBody">
              <!-- Results will be inserted here by JS -->
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination">
          <!-- Pagination controls will be inserted here by JS -->
        </div>
      </div>
      <!-- Add/Edit Form Section -->
      <div id="formSection" class="form-section" style="display:none;">
        <h2 id="formTitle" data-i18n="formTitle">نموذج المركبة</h2>
        <form id="vehicleForm" autocomplete="off" novalidate data-department-id="1" data-division-id="1">
        <div class="form-row">
          <div class="col">
            <label for="plate_number" id="lbl_plate" data-i18n="label_plate">رقم المركبة (vehicle_code)</label>
            <input id="plate_number" name="plate_number" class="form-control" data-i18n-placeholder="platePlaceholder" placeholder="مثال: 12345" required />
          </div>
          <div class="col">
            <label for="type" id="lbl_type" data-i18n="label_type">النوع (type)</label>
            <input id="type" name="type" class="form-control" data-i18n-placeholder="typePlaceholder" placeholder="مثال: شاحنة" />
          </div>
        </div>
        <div class="form-row">
          <div class="col">
            <label for="year" id="lbl_year" data-i18n="label_year">سنة الصنع (manufacture_year)</label>
            <input id="year" name="year" type="number" min="1900" max="2099" class="form-control" />
          </div>
          <div class="col">
            <label for="vehicle_mode" id="lbl_mode" data-i18n="label_mode">نمط المركبة</label>
            <select id="vehicle_mode" name="vehicle_mode" class="form-control"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="col">
            <label for="emp_id" id="lbl_emp" data-i18n="label_emp">الرمز الوظيفي لسائق المركبة (emp_id)</label>
            <input id="emp_id" name="emp_id" class="form-control" data-i18n-placeholder="empPlaceholder" placeholder="أدخل رمز الوظيفي لسائق المركبة" required />
          </div>
        </div>
        <div class="form-row">
          <div class="col">
            <label for="driver_name" id="lbl_driver" data-i18n="label_driver">اسم السائق</label>
            <input id="driver_name" name="driver_name" class="form-control" data-i18n-placeholder="driverNamePlaceholder" placeholder="اسم السائق" />
          </div>
          <div class="col">
            <label for="driver_phone" id="lbl_driver_phone" data-i18n="label_driver_phone">هاتف السائق</label>
            <input id="driver_phone" name="driver_phone" class="form-control" data-i18n-placeholder="driverPhonePlaceholder" placeholder="هاتف السائق" />
          </div>
        </div>
        <hr style="margin:14px 0;border-top:1px solid var(--border)">
        <div class="form-row select-row">
          <select id="sector_id" name="sector_id" class="form-control" data-i18n-placeholder="sectorSelPlaceholder"></select>
          <select id="department_id" name="department_id" class="form-control" data-i18n-placeholder="deptSelPlaceholder"></select>
        </div>
        <div class="form-row select-row" style="margin-top:10px">
          <select id="section_id" name="section_id" class="form-control" data-i18n-placeholder="sectionSelPlaceholder"></select>
          <select id="division_id" name="division_id" class="form-control" data-i18n-placeholder="divisionSelPlaceholder"></select>
        </div>
        <div class="form-row select-row" style="margin-top:10px">
          <select id="status" name="status" class="form-control" data-i18n-placeholder="statusSelPlaceholder"></select>
        </div>
        <div class="form-row">
          <div class="col">
            <label for="notes" id="lbl_notes" data-i18n="label_notes">ملاحظات</label>
            <textarea id="notes" name="notes" class="form-control" data-i18n-placeholder="notesPlaceholder"></textarea>
          </div>
        </div>
        <div class="actions">
          <button id="submitBtn" class="btn" type="submit" data-i18n="submit">💾 حفظ المركبة</button>
          <button id="cancelBtn" type="button" class="btn ghost icon-only" data-i18n-title="cancel" title="إلغاء">❌</button>
        </div>
        <div id="msg" class="form-help" role="status" aria-live="polite"></div>
      </form>
      </div>
    </section>
  </main>
  <script src="/vehicle_management/assets/js/add_Vehicles.js"></script>
</body>
</html>
