<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Vehicle Movement</title>
    <link rel="stylesheet" href="assets/css/add_vehicle_movements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="movement-modal">
    <div class="modal-header">
        <h2>
            <i class="fas fa-car-alt"></i>
            <span data-lang-key="header_title">Record Vehicle Movement</span>
        </h2>
        <a href="dashboard.php" id="close-modal" class="icon-btn close-btn" title="Close and return to dashboard">
            <i class="fas fa-home"></i>
        </a>
    </div>
  
    <div class="modal-content">
        <form id="vehicle-movement-form" enctype="multipart/form-data">
          
            <!-- Vehicle Info Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-car"></i>
                    <h3 data-lang-key="vehicle_info_section">Vehicle Information</h3>
                </div>
              
                <div class="form-group">
                    <label for="vehicle_code" class="form-label">
                        <i class="fas fa-barcode"></i>
                        <span data-lang-key="vehicle_code_label">Vehicle Code</span>
                    </label>
                    <input type="text" id="vehicle_code" name="vehicle_code" required
                           class="form-input" placeholder="Enter vehicle code">
                </div>
                <div class="form-group">
                    <label for="operation_type" class="form-label">
                        <i class="fas fa-exchange-alt"></i>
                        <span data-lang-key="operation_type_label">Operation Type</span>
                    </label>
                    <select id="operation_type" name="operation_type" required class="form-input">
                        <option value="" disabled selected data-lang-key="operation_type_select">-- Select operation type --</option>
                        <option value="pickup" data-lang-key="operation_type_pickup">Pickup</option>
                        <option value="return" data-lang-key="operation_type_return">Return</option>
                    </select>
                </div>
            </div>

            <!-- Employee Info Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-user-tie"></i>
                    <h3 data-lang-key="employee_info_section">Employee Information</h3>
                </div>
                <div class="form-group" id="performed-by-group">
                    <label for="performed_by" class="form-label">
                        <i class="fas fa-id-badge"></i>
                        <span data-lang-key="performed_by_label">Performed By</span>
                    </label>
                    <div class="input-with-icon">
                        <input type="text" id="performed_by" name="performed_by" required
                               class="form-input" placeholder="Employee ID">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    <small class="input-hint" id="performed-by-hint"></small>
                </div>
            </div>

            <!-- Vehicle Condition Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-clipboard-check"></i>
                    <h3 data-lang-key="condition_section">Vehicle Condition</h3>
                </div>
                <div class="form-group">
                    <label for="vehicle_condition" class="form-label">
                        <i class="fas fa-car-crash"></i>
                        <span data-lang-key="vehicle_condition_label">Condition</span>
                    </label>
                    <select id="vehicle_condition" name="vehicle_condition" class="form-input">
                        <option value="">-- Select --</option>
                        <option value="clean" data-lang-key="condition_clean">Clean</option>
                        <option value="acceptable" data-lang-key="condition_acceptable">Acceptable</option>
                        <option value="damaged" data-lang-key="condition_damaged">Damaged</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="fuel_level" class="form-label">
                        <i class="fas fa-gas-pump"></i>
                        <span data-lang-key="fuel_level_label">Fuel Level</span>
                    </label>
                    <select id="fuel_level" name="fuel_level" class="form-input">
                        <option value="">-- Select --</option>
                        <option value="full" data-lang-key="fuel_full">Full</option>
                        <option value="three_quarter" data-lang-key="fuel_three_quarter">3/4</option>
                        <option value="half" data-lang-key="fuel_half">Half</option>
                        <option value="quarter" data-lang-key="fuel_quarter">1/4</option>
                        <option value="empty" data-lang-key="fuel_empty">Empty</option>
                    </select>
                </div>
            </div>

            <!-- Location Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-map-marked-alt"></i>
                    <h3 data-lang-key="location_section">GPS Location</h3>
                </div>
                <div class="location-controls">
                    <button type="button" id="get-location-btn" class="icon-btn location-btn">
                        <i class="fas fa-location-arrow"></i>
                        <span data-lang-key="get_location_button">Get Location</span>
                    </button>
                    <button type="button" id="open-map-btn" class="icon-btn map-btn" disabled>
                        <i class="fas fa-external-link-alt"></i>
                        <span data-lang-key="open_map_button">Map</span>
                    </button>
                    <button type="button" id="clear-location-btn" class="icon-btn clear-btn">
                        <i class="fas fa-trash-alt"></i>
                        <span data-lang-key="clear_location_button">Clear</span>
                    </button>
                </div>
                <div class="coordinates-grid">
                    <div class="coordinate-group">
                        <label for="latitude" class="coordinate-label">
                            <i class="fas fa-arrows-alt-v"></i>
                            <span data-lang-key="latitude_label">Latitude</span>
                        </label>
                        <input type="number" id="latitude" name="latitude" step="0.00000001"
                               placeholder="Latitude" class="coordinate-input">
                    </div>
                    <div class="coordinate-group">
                        <label for="longitude" class="coordinate-label">
                            <i class="fas fa-arrows-alt-h"></i>
                            <span data-lang-key="longitude_label">Longitude</span>
                        </label>
                        <input type="number" id="longitude" name="longitude" step="0.00000001"
                               placeholder="Longitude" class="coordinate-input">
                    </div>
                </div>
                <div id="location-status" class="status-box">
                    <i class="fas fa-info-circle"></i>
                    <span></span>
                </div>
            </div>

            <!-- Notes & Photos Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-sticky-note"></i>
                    <h3 data-lang-key="notes_section">Notes & Attachments</h3>
                </div>
                <div class="form-group">
                    <label for="notes" class="form-label">
                        <i class="fas fa-edit"></i>
                        <span data-lang-key="notes_label">Notes</span>
                    </label>
                    <textarea id="notes" name="notes" rows="3"
                              class="form-textarea" placeholder="Enter notes..."></textarea>
                </div>
                <div class="form-group">
                    <label for="photos" class="form-label">
                        <i class="fas fa-camera"></i>
                        <span data-lang-key="photos_label">Movement Photos</span>
                        <span class="badge" data-lang-key="photos_max">Max 6 photos</span>
                    </label>
                    <div class="file-upload-area" id="drop-area">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p data-lang-key="upload_area_text">Drag photos here or click to select</p>
                        <input type="file" id="photos" name="photos[]" accept="image/jpeg,image/jpg,image/png" multiple>
                    </div>
                    <div id="photos-preview" class="photos-grid"></div>
                </div>
            </div>

            <!-- Previous Movements Navigation -->
            <div id="navigation-container" class="navigation-container" style="display: none;">
                <div class="navigation-header">
                    <h4><i class="fas fa-history"></i> <span data-lang-key="prev_movements">Previous Vehicle Movements</span></h4>
                </div>
                <div class="navigation-controls">
                    <button type="button" id="prev-movement" class="btn btn-outline" disabled>
                        <i class="fas fa-chevron-left"></i> <span data-lang-key="prev_btn">Previous</span>
                    </button>
                    <span id="movement-counter" class="movement-counter">0 / 0</span>
                    <button type="button" id="next-movement" class="btn btn-outline" disabled>
                        <span data-lang-key="next_btn">Next</span> <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="movements-list">
                    <ul id="vehicle-movements-list" class="vehicle-movements-list"></ul>
                </div>
            </div>

            <!-- Hidden Fields -->
            <input type="hidden" id="created_by" name="created_by">
            <input type="hidden" id="updated_by" name="updated_by">
            <input type="hidden" id="movement_datetime" name="movement_datetime">
            <input type="hidden" id="user_language" name="user_language" value="en">
            <input type="hidden" id="user_role" name="user_role">
            <input type="hidden" id="movement_id" name="movement_id">

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button type="submit" class="action-btn primary-btn">
                    <i class="fas fa-check-circle"></i>
                    <span data-lang-key="submit_button">Submit</span>
                </button>
                <button type="button" id="cancel-btn" class="action-btn danger-btn">
                    <i class="fas fa-times"></i>
                    <span data-lang-key="cancel_button">Cancel</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/add_vehicle_movements.js"></script>
</body>
</html>
