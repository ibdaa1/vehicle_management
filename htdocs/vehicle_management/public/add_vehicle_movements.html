<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="page_title">تسجيل حركة مركبة</title>
    <link rel="stylesheet" href="/vehicle_management/assets/css/add_vehicle_movements.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="movement-modal">
    <div class="modal-header">
        <h2>
            <i class="fas fa-car-alt"></i>
            <span data-lang-key="header_title">تسجيل حركة مركبة</span>
        </h2>
        <a href="/vehicle_management/index.php" id="close-modal" class="icon-btn close-btn" title="إغلاق والعودة للرئيسية">
            <i class="fas fa-home"></i>
        </a>
    </div>
  
    <div class="modal-content">
        <form id="vehicle-movement-form" enctype="multipart/form-data">
          
            <!-- Vehicle Info Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-car"></i>
                    <h3 data-lang-key="vehicle_info_section">معلومات المركبة</h3>
                </div>
              
                <div class="form-group">
                    <label for="vehicle_code" class="form-label">
                        <i class="fas fa-barcode"></i>
                        <span data-lang-key="vehicle_code_label">رمز المركبة</span>
                    </label>
                    <input type="text" id="vehicle_code" name="vehicle_code" required
                           class="form-input" data-lang-key-placeholder="vehicle_code_placeholder">
                </div>
                <div class="form-group">
                    <label for="operation_type" class="form-label">
                        <i class="fas fa-exchange-alt"></i>
                        <span data-lang-key="operation_type_label">نوع العملية</span>
                    </label>
                    <select id="operation_type" name="operation_type" required class="form-input">
                        <option value="" disabled selected data-lang-key="operation_type_select">-- اختر نوع العملية --</option>
                        <option value="pickup" data-lang-key="operation_type_pickup">استلام (Pickup)</option>
                        <option value="return" data-lang-key="operation_type_return">إرجاع (Return)</option>
                    </select>
                </div>
            </div>

            <!-- Employee Info Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-user-tie"></i>
                    <h3 data-lang-key="employee_info_section">معلومات الموظف</h3>
                </div>
                <div class="form-group" id="performed-by-group">
                    <label for="performed_by" class="form-label">
                        <i class="fas fa-id-badge"></i>
                        <span data-lang-key="performed_by_label">قام بالعملية</span>
                    </label>
                    <div class="input-with-icon">
                        <input type="text" id="performed_by" name="performed_by" required
                               class="form-input" data-lang-key-placeholder="performed_by_placeholder">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                    <small class="input-hint" id="performed-by-hint"></small>
                </div>
                <!-- Admin Only Field -->
                <div class="form-group" id="admin-performed-by-group" style="display: none;">
                    <label for="admin_performed_by" class="form-label">
                        <i class="fas fa-user-edit"></i>
                        <span data-lang-key="admin_performed_by_label">تسجيل لموظف آخر</span>
                    </label>
                    <div class="input-with-icon">
                        <input type="text" id="admin_performed_by" name="admin_performed_by"
                               class="form-input" data-lang-key-placeholder="admin_performed_by_placeholder">
                        <i class="fas fa-search input-icon" id="employee-search"></i>
                    </div>
                    <small class="input-hint" data-lang-key="admin_hint">
                        <i class="fas fa-shield-alt"></i>
                        <span data-lang-key="admin_hint">متاح للمسؤولين فقط</span>
                    </small>
                </div>
            </div>

            <!-- Location Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-map-marked-alt"></i>
                    <h3 data-lang-key="location_section">الموقع الجغرافي</h3>
                </div>
                <div class="location-controls">
                    <button type="button" id="get-location-btn" class="icon-btn location-btn">
                        <i class="fas fa-location-arrow"></i>
                        <span data-lang-key="get_location_button">جلب الموقع</span>
                    </button>
                    <button type="button" id="open-map-btn" class="icon-btn map-btn" disabled>
                        <i class="fas fa-external-link-alt"></i>
                        <span data-lang-key="open_map_button">خرائط</span>
                    </button>
                    <button type="button" id="clear-location-btn" class="icon-btn clear-btn">
                        <i class="fas fa-trash-alt"></i>
                        <span data-lang-key="clear_location_button">مسح</span>
                    </button>
                </div>
                <div class="coordinates-grid">
                    <div class="coordinate-group">
                        <label for="latitude" class="coordinate-label">
                            <i class="fas fa-arrows-alt-v"></i>
                            <span data-lang-key="latitude_label">خط العرض</span>
                        </label>
                        <input type="number" id="latitude" name="latitude" step="0.00000001"
                               data-lang-key-placeholder="latitude_placeholder" class="coordinate-input">
                    </div>
                    <div class="coordinate-group">
                        <label for="longitude" class="coordinate-label">
                            <i class="fas fa-arrows-alt-h"></i>
                            <span data-lang-key="longitude_label">خط الطول</span>
                        </label>
                        <input type="number" id="longitude" name="longitude" step="0.00000001"
                               data-lang-key-placeholder="longitude_placeholder" class="coordinate-input">
                    </div>
                </div>
                <div id="location-status" class="status-box">
                    <i class="fas fa-info-circle"></i>
                    <span></span>
                </div>
            </div>

            <!-- قسم خيارات المسؤول – تجاوز القيود (للأدمن فقط) -->
            <div id="force-operation-group" class="form-group" style="display: none;">
                <div class="alert alert-warning" style="background:#fff3cd;border:1px solid #ffeaa7;padding:15px;border-radius:10px;">
                    <h6 style="margin:0 0 10px 0;color:#856404;">
                        <i class="fas fa-exclamation-triangle"></i> خيارات المسؤول
                    </h6>
                    <div class="form-check" style="margin-bottom:10px;">
                        <input type="checkbox" class="form-check-input" id="force-operation" name="force_operation">
                        <label class="form-check-label" for="force-operation" style="color:#856404;font-weight:600;">
                            الإجبار على الحفظ (تجاوز القيود)
                        </label>
                    </div>
                    <small class="text-muted" style="display:block;margin-bottom:10px;">
                        استخدم هذا الخيار فقط عند الضرورة القصوى. سيتم تسجيل سبب الإجبار في الملاحظات.
                    </small>
                    <div style="background:#8564041a;padding:10px;border-radius:8px;">
                        <label style="color:#856404;font-size:13px;">
                            <i class="fas fa-info-circle"></i>
                            عند تفعيل خيار الإجبار، يرجى توضيح السبب في حقل الملاحظات أدناه
                        </label>
                    </div>
                </div>
            </div>

            <!-- Notes & Photos Section -->
            <div class="form-section">
                <div class="section-header">
                    <i class="fas fa-sticky-note"></i>
                    <h3 data-lang-key="notes_section">ملاحظات ومرفقات</h3>
                </div>
                <div class="form-group">
                    <label for="notes" class="form-label">
                        <i class="fas fa-edit"></i>
                        <span data-lang-key="notes_label">ملاحظات</span>
                    </label>
                    <textarea id="notes" name="notes" rows="3"
                              class="form-textarea" data-lang-key-placeholder="notes_placeholder"></textarea>
                </div>
                <div class="form-group">
                    <label for="photos" class="form-label">
                        <i class="fas fa-camera"></i>
                        <span data-lang-key="photos_label">صور الحركة</span>
                        <span class="badge" data-lang-key="photos_max">6 صور كحد أقصى</span>
                    </label>
                    <div class="file-upload-area" id="drop-area">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p data-lang-key="upload_area_text">اسحب الصور هنا أو انقر للاختيار</p>
                        <input type="file" id="photos" name="photos[]" accept="image/*" multiple>
                    </div>
                    <div id="photos-preview" class="photos-grid"></div>
                </div>
            </div>

            <!-- قسم حركات المركبة السابقة -->
            <div id="navigation-container" class="navigation-container" style="display: none;">
                <div class="navigation-header">
                    <h4><i class="fas fa-history"></i> حركات المركبة السابقة</h4>
                </div>
                <div class="navigation-controls">
                    <button type="button" id="prev-movement" class="btn btn-outline" disabled>
                        <i class="fas fa-chevron-right"></i> السابق
                    </button>
                    <span id="movement-counter" class="movement-counter">0 / 0</span>
                    <button type="button" id="next-movement" class="btn btn-outline" disabled>
                        التالي <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
                <div class="movements-list">
                    <ul id="vehicle-movements-list" class="vehicle-movements-list"></ul>
                </div>
            </div>

            <!-- Hidden Fields -->
            <input type="hidden" id="created_by" name="created_by">
            <input type="hidden" id="updated_by" name="updated_by">
            <input type="hidden" id="movement_datetime" name="movement_datetime">
            <input type="hidden" id="user_language" name="user_language" value="ar">
            <input type="hidden" id="user_role" name="user_role">
            <input type="hidden" id="movement_id" name="movement_id">

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button type="submit" class="action-btn primary-btn">
                    <i class="fas fa-check-circle"></i>
                    <span data-lang-key="submit_button">تسجيل</span>
                </button>
                <button type="button" id="save-draft" class="action-btn secondary-btn">
                    <i class="fas fa-save"></i>
                    <span data-lang-key="save_draft_button">حفظ مسودة</span>
                </button>
                <button type="button" id="cancel-btn" class="action-btn danger-btn">
                    <i class="fas fa-times"></i>
                    <span data-lang-key="cancel_button">إلغاء</span>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Employee Search Modal -->
<div id="employee-search-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3><i class="fas fa-search"></i> <span data-lang-key="search_modal_title">بحث عن موظف</span></h3>
            <button type="button" class="icon-btn close-btn close-search">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="search-box">
                <input type="text" id="employee-search-input" data-lang-key-placeholder="search_placeholder">
                <button type="button" id="search-employee-btn" class="icon-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div id="employee-results" class="search-results"></div>
        </div>
    </div>
</div>

<script src="/vehicle_management/assets/js/add_vehicle_movements.js"></script>
</body>
</html>
