<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-lang-key="dashboard">لوحة التحكم</title>
    <link rel="stylesheet" href="css/theme.css">
    <style>
    /* === Dashboard Page-Specific Styles === */

    /* Stats grid — 6 cards, responsive */
    .dashboard-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-bottom:32px}
    .dash-stat{
        display:flex;gap:16px;align-items:center;
        background:var(--bg-card);padding:20px;border-radius:12px;
        box-shadow:var(--card-shadow);border:1px solid var(--border-default);
        border-inline-start:4px solid var(--border-default);
        transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden
    }
    .dash-stat:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
    .dash-stat.accent-blue   {border-inline-start-color:var(--status-info)}
    .dash-stat.accent-green  {border-inline-start-color:var(--status-success)}
    .dash-stat.accent-warning{border-inline-start-color:var(--status-warning)}
    .dash-stat.accent-danger {border-inline-start-color:var(--status-danger)}
    .dash-stat.accent-info   {border-inline-start-color:var(--status-info)}
    .dash-stat.accent-gold   {border-inline-start-color:var(--accent-gold)}
    .dash-stat .s-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
    .dash-stat .s-icon.blue{background:rgba(23,162,184,.12);color:var(--status-info)}
    .dash-stat .s-icon.green{background:rgba(40,167,69,.12);color:var(--status-success)}
    .dash-stat .s-icon.gold{background:rgba(212,175,55,.12);color:var(--accent-gold)}
    .dash-stat .s-icon.red{background:rgba(220,53,69,.12);color:var(--status-danger)}
    .dash-stat .s-icon.info{background:rgba(23,162,184,.12);color:var(--status-info)}
    .dash-stat .s-icon.warn{background:rgba(255,193,7,.15);color:#c49000}
    .dash-stat .s-info h4{font-size:.85rem;color:var(--text-secondary);font-weight:500;margin-bottom:4px}
    .dash-stat .s-info .s-value{font-size:1.6rem;font-weight:700;color:var(--text-primary)}

    /* Section helpers */
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .section-header h3{font-size:1.1rem;font-weight:700;color:var(--text-primary)}
    .section-card{background:var(--bg-card);border-radius:12px;box-shadow:var(--card-shadow);border:1px solid var(--border-default);padding:20px;margin-bottom:28px}

    /* Recent vehicles grid */
    .vehicles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .vehicles-grid .vehicle-card{cursor:pointer;transition:transform .3s,box-shadow .3s}
    .vehicles-grid .vehicle-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}

    /* Quick actions */
    .quick-actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .action-card{
        display:flex;flex-direction:column;align-items:center;gap:10px;
        padding:24px 16px;background:var(--bg-card);border-radius:12px;
        box-shadow:var(--card-shadow);border:1px solid var(--border-default);
        cursor:pointer;transition:all .3s;text-decoration:none;color:var(--text-primary)
    }
    .action-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);border-color:var(--primary-light)}
    .action-card .action-icon{font-size:2rem;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(58,81,58,.06)}
    .action-card .action-label{font-size:.9rem;font-weight:600;text-align:center}

    /* Loading / empty */
    .loading-placeholder{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--text-secondary)}
    .loading-placeholder .spinner{margin-inline-end:12px}
    .empty-state{text-align:center;padding:40px 24px;color:var(--text-secondary)}
    .empty-state .empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.5}

    /* Responsive */
    @media(max-width:768px){
        .dashboard-stats{grid-template-columns:repeat(2,1fr)}
        .vehicles-grid{grid-template-columns:1fr}
        .quick-actions{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:480px){
        .dashboard-stats{grid-template-columns:repeat(2,1fr);gap:12px}
        .dash-stat{padding:14px;gap:10px}
        .dash-stat .s-icon{width:42px;height:42px;font-size:1.2rem}
        .dash-stat .s-info .s-value{font-size:1.3rem}
        .quick-actions{grid-template-columns:1fr 1fr}
        .action-card{padding:16px 12px}
    }
    </style>
</head>
<body>
    <!-- ========== HEADER ========== -->
    <header class="app-header">
        <div class="logo-area">
            <button class="btn btn-ghost btn-icon" data-action="toggle-sidebar-mobile" style="color:var(--text-light)">&#9776;</button>
            <img src="logo/logo.png" alt="Logo" id="headerLogo" onerror="this.style.display='none'">
            <h1 id="headerTitle" data-lang-key="system_name">نظام إدارة المركبات</h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost btn-icon" data-action="toggle-theme" title="Toggle theme" id="themeBtn">&#9728;&#65039;</button>
            <button class="btn btn-ghost btn-sm" data-action="toggle-lang" id="langBtn">EN</button>
            <div class="user-info"></div>
            <button class="btn btn-ghost btn-sm" data-action="logout" data-lang-key="logout">خروج</button>
        </div>
    </header>

    <!-- ========== SIDEBAR ========== -->
    <aside class="app-sidebar">
        <nav class="menu-list"></nav>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="app-main">
        <div class="page-header">
            <h2 data-lang-key="dashboard">لوحة التحكم</h2>
        </div>

        <!-- ===== STATS ===== -->
        <div class="dashboard-stats" id="statsGrid">
            <div class="dash-stat accent-blue">
                <div class="s-icon blue">&#128663;</div>
                <div class="s-info">
                    <h4 data-lang-key="total_vehicles">إجمالي المركبات</h4>
                    <div class="s-value" id="statTotal">&mdash;</div>
                </div>
            </div>
            <div class="dash-stat accent-green">
                <div class="s-icon green">&#9989;</div>
                <div class="s-info">
                    <h4 data-lang-key="operational">تعمل</h4>
                    <div class="s-value" id="statOperational">&mdash;</div>
                </div>
            </div>
            <div class="dash-stat accent-warning">
                <div class="s-icon warn">&#128295;</div>
                <div class="s-info">
                    <h4 data-lang-key="maintenance">صيانة</h4>
                    <div class="s-value" id="statMaintenance">&mdash;</div>
                </div>
            </div>
            <div class="dash-stat accent-danger">
                <div class="s-icon red">&#9940;</div>
                <div class="s-info">
                    <h4 data-lang-key="out_of_service">خارج الخدمة</h4>
                    <div class="s-value" id="statOutOfService">&mdash;</div>
                </div>
            </div>
            <div class="dash-stat accent-info">
                <div class="s-icon info">&#128203;</div>
                <div class="s-info">
                    <h4 data-lang-key="unpaid_violations">مخالفات غير مدفوعة</h4>
                    <div class="s-value" id="statViolations">&mdash;</div>
                </div>
            </div>
            <div class="dash-stat accent-gold">
                <div class="s-icon gold">&#128101;</div>
                <div class="s-info">
                    <h4 data-lang-key="active_users">المستخدمون النشطون</h4>
                    <div class="s-value" id="statUsers">&mdash;</div>
                </div>
            </div>
        </div>

        <!-- ===== QUICK ACTIONS ===== -->
        <div class="section-header">
            <h3 data-lang-key="quick_actions">إجراءات سريعة</h3>
        </div>
        <div class="quick-actions" id="quickActions">
            <a class="action-card" href="vehicle_management.html?action=add">
                <div class="action-icon">&#128663;</div>
                <div class="action-label" data-lang-key="add_vehicle">إضافة مركبة</div>
            </a>
            <a class="action-card" href="report_add_Vehicles.html">
                <div class="action-icon">&#128202;</div>
                <div class="action-label" data-lang-key="view_reports">عرض التقارير</div>
            </a>
            <a class="action-card" href="admin_users.html">
                <div class="action-icon">&#128101;</div>
                <div class="action-label" data-lang-key="manage_users">إدارة المستخدمين</div>
            </a>
        </div>

        <!-- ===== RECENT VEHICLES ===== -->
        <div class="section-card">
            <div class="section-header">
                <h3 data-lang-key="recent_vehicles">أحدث المركبات</h3>
                <a href="vehicle_management.html" class="btn btn-outline btn-sm" data-lang-key="view_all">عرض الكل</a>
            </div>
            <div id="recentVehicles">
                <div class="loading-placeholder"><div class="spinner spinner-sm"></div><span data-lang-key="loading">جارٍ التحميل...</span></div>
            </div>
        </div>

    </main>

    <!-- ========== FOOTER ========== -->
    <footer class="app-footer">
        <span id="footerText" data-lang-key="footer_text">نظام إدارة المركبات &copy; 2024</span>
    </footer>

    <script src="js/app.js"></script>
    <script>
    /* ============================================
       Dashboard Controller
       ============================================ */
    (function () {
        'use strict';

        const $ = id => document.getElementById(id);

        /* ---------- Status helpers ---------- */
        const STATUS_MAP = {
            operational:     { ar: 'تعمل',         en: 'Operational',      badge: 'badge-success' },
            maintenance:     { ar: 'صيانة',         en: 'Maintenance',      badge: 'badge-warning' },
            out_of_service:  { ar: 'خارج الخدمة',   en: 'Out of Service',   badge: 'badge-danger'  },
            default:         { ar: 'غير محدد',       en: 'Unknown',          badge: 'badge-info'    }
        };

        function statusBadge(status) {
            const s = STATUS_MAP[status] || STATUS_MAP.default;
            const label = (i18n.lang === 'ar') ? s.ar : s.en;
            return '<span class="badge ' + s.badge + '">' + UI._escapeHtml(label) + '</span>';
        }

        /* ---------- Load stats ---------- */
        async function loadStats() {
            try {
                const res = await API.get('/dashboard/stats');
                const d = res.data || res;
                if (d.total !== undefined)          $('statTotal').textContent       = UI.formatNumber(d.total);
                if (d.operational !== undefined)     $('statOperational').textContent = UI.formatNumber(d.operational);
                if (d.maintenance !== undefined)     $('statMaintenance').textContent = UI.formatNumber(d.maintenance);
                if (d.out_of_service !== undefined)  $('statOutOfService').textContent= UI.formatNumber(d.out_of_service);
                if (d.unpaid_violations !== undefined)$('statViolations').textContent = UI.formatNumber(d.unpaid_violations);
                if (d.active_users !== undefined)    $('statUsers').textContent       = UI.formatNumber(d.active_users);
            } catch {
                /* Stats stay as dashes on error */
            }
        }

        /* ---------- Load recent vehicles ---------- */
        async function loadRecentVehicles() {
            const container = $('recentVehicles');
            try {
                const res = await API.get('/vehicles?limit=8&sort=-created_at');
                const vehicles = Array.isArray(res.data) ? res.data : (Array.isArray(res) ? res : []);
                const list = vehicles.slice(0, 8);

                if (!list.length) {
                    container.innerHTML =
                        '<div class="empty-state"><div class="empty-icon">&#128663;</div>' +
                        '<p data-lang-key="no_vehicles">' + (i18n.lang === 'ar' ? 'لا توجد مركبات بعد' : 'No vehicles yet') + '</p></div>';
                    return;
                }

                let html = '<div class="vehicles-grid">';
                list.forEach(v => {
                    const code   = UI._escapeHtml(v.vehicle_code || v.code || '—');
                    const type   = UI._escapeHtml(v.vehicle_type || v.type || '—');
                    const driver = UI._escapeHtml(v.driver_name  || v.driver || '—');
                    const dept   = UI._escapeHtml(v.department   || '—');
                    const year   = UI._escapeHtml(String(v.year  || '—'));
                    const status = v.status || 'operational';

                    html += '<div class="card vehicle-card" onclick="location.href=\'vehicle_management.html\'">' +
                        '<div class="vehicle-card-header"><strong>' + code + '</strong>' + statusBadge(status) + '</div>' +
                        '<div class="vehicle-card-body">' +
                            '<div class="detail-row"><span class="label">' + (i18n.lang === 'ar' ? 'النوع' : 'Type')       + '</span><span class="value">' + type   + '</span></div>' +
                            '<div class="detail-row"><span class="label">' + (i18n.lang === 'ar' ? 'السائق' : 'Driver')    + '</span><span class="value">' + driver + '</span></div>' +
                            '<div class="detail-row"><span class="label">' + (i18n.lang === 'ar' ? 'الإدارة' : 'Dept')     + '</span><span class="value">' + dept   + '</span></div>' +
                            '<div class="detail-row"><span class="label">' + (i18n.lang === 'ar' ? 'السنة' : 'Year')       + '</span><span class="value">' + year   + '</span></div>' +
                        '</div></div>';
                });
                html += '</div>';
                container.innerHTML = html;
            } catch {
                container.innerHTML =
                    '<div class="empty-state"><div class="empty-icon">&#9888;&#65039;</div>' +
                    '<p>' + (i18n.lang === 'ar' ? 'تعذر تحميل المركبات' : 'Failed to load vehicles') + '</p></div>';
            }
        }

        /* ---------- Mark dashboard active in sidebar ---------- */
        function activateSidebarItem() {
            document.querySelectorAll('.app-sidebar .menu-item').forEach(el => {
                const href = el.getAttribute('href');
                if (href && (href.includes('dashboard.html') || href.includes('index.html'))) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        /* ---------- Init ---------- */
        document.addEventListener('DOMContentLoaded', async () => {
            /* app.js handles auth, sidebar, theme, i18n.
               We wait a tick for it to finish, then load dashboard data. */
            await new Promise(r => setTimeout(r, 100));
            activateSidebarItem();

            /* Load all sections in parallel */
            loadStats();
            loadRecentVehicles();

            /* Auto-refresh stats every 60 s */
            setInterval(loadStats, 60000);
        });
    })();
    </script>
</body>
</html>
